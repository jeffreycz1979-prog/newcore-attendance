<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NewCore 語音點名</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; font-size: 14px; }

  /* ── 頂部 ── */
  .top { background: #274e13; color: white; padding: 12px 18px; display: flex; align-items: center; gap: 12px; }
  .top h2 { font-size: 15px; font-weight: 700; flex: 1; }
  .top .sub { font-size: 11px; opacity: 0.75; }
  .tab-bar { display: flex; }
  .tab-btn { padding: 6px 14px; font-size: 13px; border: none; cursor: pointer;
             background: rgba(255,255,255,0.15); color: white; border-radius: 6px; margin-left: 6px; }
  .tab-btn.active { background: white; color: #274e13; font-weight: 700; }

  .body { padding: 14px; max-width: 800px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  .card { background: white; border-radius: 12px; padding: 14px 16px;
          margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase;
          letter-spacing: .04em; display: block; margin-bottom: 5px; }
  select { width: 100%; padding: 9px 10px; font-size: 13px; border-radius: 8px;
           border: 1px solid #ddd; background: #fafafa; color: #222; }
  .lesson-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
  .info-box { background: #f8f9fa; border-radius: 8px; padding: 8px 10px; text-align: center; }
  .info-box .val { font-size: 15px; font-weight: 700; color: #274e13; }
  .info-box .lbl { font-size: 10px; color: #999; margin-top: 2px; }
  .mic-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
             border-radius: 10px; border: none; background: #274e13; color: white; cursor: pointer; margin-bottom: 10px; }
  .mic-btn.listening { background: #c0392b; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
  .status-bar { text-align: center; padding: 9px 12px; border-radius: 8px; font-size: 12px;
                background: #eee; color: #666; min-height: 36px;
                display: flex; align-items: center; justify-content: center; line-height: 1.5; }
  .status-bar.ok   { background: #e6f4ea; color: #1e7e34; }
  .status-bar.err  { background: #fce8e6; color: #c0392b; }
  .status-bar.info { background: #e8f0fe; color: #1a5276; }
  .hint-box { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-top: 10px;
              font-size: 11px; color: #888; line-height: 1.9; }
  .hint-box b { color: #274e13; }
  .summary { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 4px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  /* 點名表格 */
  table { width: 100%; border-collapse: collapse; }
  th { background: #f1f3f4; font-size: 11px; font-weight: 700; padding: 8px 4px; text-align: center; color: #666; }
  th:first-child { text-align: left; padding-left: 10px; min-width: 110px; }
  td { padding: 7px 4px; font-size: 13px; text-align: center; border-bottom: 1px solid #f5f5f5; }
  td:first-child { text-align: left; padding-left: 10px; }
  tr:last-child td { border-bottom: none; }
  tr.highlight td { background: #fffde7; }
  .name-en { font-weight: 600; font-size: 13px; color: #222; }
  .name-zh { font-size: 11px; color: #999; margin-top: 1px; }
  .sym-btn { width: 28px; height: 26px; border-radius: 5px; border: 1px solid #e0e0e0;
             background: white; font-size: 13px; cursor: pointer; }
  .sym-btn.sel-V  { background: #e6f4ea; border-color: #1e7e34; font-weight: 700; }
  .sym-btn.sel-x1 { background: #fce8e6; border-color: #c0392b; font-weight: 700; }
  .sym-btn.sel-x2 { background: #f5cba7; border-color: #ca6f1e; font-weight: 700; }
  .sym-btn.sel-x3 { background: #fef9e7; border-color: #d4ac0d; font-weight: 700; }
  .sym-btn.sel-x4 { background: #fad7a0; border-color: #ca8a04; font-weight: 700; }
  .sym-btn.sel-x5 { background: #e8f0fe; border-color: #1a5276; font-weight: 700; }
  .score-btn { width: 46px; height: 26px; border-radius: 5px; border: 1px solid #ddd;
               background: #fafafa; font-size: 12px; cursor: pointer; color: #444; font-weight: 500; }
  .score-btn.has-score { background: #e8f0fe; border-color: #185FA5; color: #185FA5; font-weight: 700; }
  .log-item { font-size: 11px; color: #888; padding: 3px 0; border-bottom: 1px solid #f5f5f5; }
  .empty   { text-align: center; color: #bbb; padding: 24px 0; font-size: 13px; }
  .loading { text-align: center; color: #aaa; padding: 20px; }

  .api-bar { background: #fff8e1; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px;
             display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .api-bar input { flex: 1; min-width: 200px; padding: 7px 10px; font-size: 11px;
                   border-radius: 6px; border: 1px solid #ddd; font-family: monospace; }
  .api-bar button { padding: 7px 16px; font-size: 13px; border-radius: 6px; border: none;
                    background: #274e13; color: white; cursor: pointer; }

  /* ── 轉盤 ── */
  .wheel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45);
                   display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
  .wheel-panel { background: white; width: 100%; max-width: 480px;
                 border-radius: 20px 20px 0 0; padding: 0 0 24px; animation: slideUp .25s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .wheel-header { display: flex; align-items: center; justify-content: space-between;
                  padding: 16px 20px 12px; border-bottom: 1px solid #f0f0f0; }
  .wheel-student { font-size: 15px; font-weight: 700; }
  .wheel-close { font-size: 22px; color: #aaa; cursor: pointer; background: none; border: none; padding: 0 4px; }
  .wheel-display { text-align: center; padding: 12px 0 4px; }
  .wheel-display .score-big { font-size: 52px; font-weight: 700; color: #274e13; line-height: 1; }
  .wheel-display .score-label { font-size: 13px; color: #aaa; margin-top: 4px; }
  .wheel-scroll-wrap { position: relative; height: 180px; overflow: hidden;
                       margin: 8px 20px; border-radius: 12px; background: #f8f9fa; }
  .wheel-scroll-wrap::before,.wheel-scroll-wrap::after { content:''; position:absolute; left:0; right:0; height:60px; z-index:2; pointer-events:none; }
  .wheel-scroll-wrap::before { top:0; background:linear-gradient(to bottom,#f8f9fa,transparent); }
  .wheel-scroll-wrap::after  { bottom:0; background:linear-gradient(to top,#f8f9fa,transparent); }
  .wheel-selector { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:52px;
                    border-top:2px solid #274e13; border-bottom:2px solid #274e13; z-index:3; pointer-events:none; }
  .wheel-scroll { height:100%; overflow-y:scroll; scroll-snap-type:y mandatory;
                  -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .wheel-scroll::-webkit-scrollbar { display:none; }
  .wheel-item { height:52px; display:flex; align-items:center; justify-content:center;
                font-size:22px; font-weight:600; color:#bbb; scroll-snap-align:center; cursor:pointer; }
  .wheel-item.center { color:#274e13; }
  .wheel-quick { display:flex; gap:8px; flex-wrap:wrap; padding:12px 20px 0; }
  .quick-btn { flex:1; min-width:48px; padding:8px 4px; border-radius:8px; border:1px solid #ddd;
               background:#f8f9fa; font-size:13px; font-weight:600; cursor:pointer; text-align:center; color:#444; }
  .quick-btn:hover { background:#274e13; color:white; border-color:#274e13; }
  .wheel-actions { display:flex; gap:10px; padding:14px 20px 0; }
  .wheel-clear   { flex:1; padding:12px; border-radius:10px; border:1px solid #ddd; background:white; font-size:14px; cursor:pointer; color:#c0392b; }
  .wheel-confirm { flex:2; padding:12px; border-radius:10px; border:none; background:#274e13; color:white; font-size:14px; font-weight:700; cursor:pointer; }

  /* ── 總表頁 ── */
  .summary-toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .summary-toolbar select { width:auto; flex:1; min-width:150px; }
  .filter-btn { padding:7px 14px; font-size:12px; border-radius:8px; border:1px solid #ddd;
                background:white; cursor:pointer; color:#444; white-space:nowrap; }
  .filter-btn.active { background:#274e13; color:white; border-color:#274e13; }

  /* 警示卡片 */
  .alert-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .alert-card { border-radius:10px; padding:12px 14px; }
  .alert-card.makeup { background:#fef3cd; border:1px solid #ffc107; }
  .alert-card.hw     { background:#fce8e6; border:1px solid #f5c6cb; }
  .alert-card .ac-title { font-size:11px; font-weight:700; color:#666; margin-bottom:6px; }
  .alert-card .ac-num   { font-size:28px; font-weight:700; }
  .alert-card.makeup .ac-num { color:#856404; }
  .alert-card.hw     .ac-num { color:#c0392b; }
  .alert-card .ac-sub { font-size:11px; color:#888; margin-top:2px; }

  /* 總表捲動 */
  .summary-table-wrap { overflow-x: auto; }
  .summary-table { border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  .summary-table th { background: #274e13; color: white; padding: 6px 8px; text-align: center;
                      font-size: 11px; font-weight: 600; position: sticky; top: 0; z-index: 2; }
  .summary-table th.name-col { text-align: left; position: sticky; left: 0; z-index: 3; background: #274e13; min-width: 100px; }
  .summary-table th.stats-col { background: #1a3a0a; }
  .summary-table th.alert-col { background: #7b1c1c; }
  .summary-table td { padding: 5px 6px; text-align: center; border-bottom: 1px solid #f0f0f0; }
  .summary-table td.name-col { text-align: left; position: sticky; left: 0; background: white;
                                z-index: 1; font-weight: 600; padding-left: 10px; min-width: 100px; }
  .summary-table tr:nth-child(even) td { background: #fafafa; }
  .summary-table tr:nth-child(even) td.name-col { background: #fafafa; }
  .summary-table tr:hover td { background: #fffde7 !important; }

  /* 出席狀態顏色 */
  .att-V  { color: #1e7e34; font-weight: 700; }
  .att-o  { color: #c0392b; font-weight: 700; }
  .att-ob { color: #ca6f1e; font-weight: 700; }
  .att-d  { color: #d4ac0d; font-weight: 700; }
  .att-db { color: #ca8a04; font-weight: 700; }
  .att-l  { color: #1a5276; font-weight: 700; }

  /* 缺項標紅 */
  .missing-makeup { background: #fff3cd !important; }
  .missing-hw     { background: #fce8e6 !important; }

  /* 統計欄 */
  .stats-val { font-weight: 600; color: #274e13; }
  .alert-count { font-weight: 700; }
  .alert-count.has-issue { color: #c0392b; }

  /* 學生詳情區 */
  .student-detail { background: white; border-radius: 10px; padding: 12px 14px; margin-top: 8px;
                    border: 1px solid #ddd; font-size: 12px; display: none; }
  .student-detail.open { display: block; }
  .detail-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .chip { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .chip.makeup { background: #fff3cd; color: #856404; }
  .chip.hw     { background: #fce8e6; color: #c0392b; }
</style>
</head>
<body>

<div class="top">
  <h2>🎤 NewCore</h2>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('attend')">點名</button>
    <button class="tab-btn"        onclick="switchTab('summary')">總表</button>
  </div>
</div>

<div class="body">

  <!-- API 設定（兩頁共用） -->
  <div class="api-bar" id="api-bar">
    <input type="text" id="api-url" placeholder="貼上 Apps Script /exec 網址" />
    <button onclick="saveApi()">連線</button>
  </div>

  <!-- ══ 點名頁 ══════════════════════════════════ -->
  <div class="page active" id="page-attend">

    <div class="card">
      <div class="row2">
        <div><label>班級</label>
          <select id="class-sel"><option value="">請先連線...</option></select></div>
        <div><label>堂次 / 日期</label>
          <select id="date-sel" disabled><option value="">請先選班級</option></select></div>
      </div>
      <div id="lesson-info" style="display:none;">
        <div class="lesson-info">
          <div class="info-box"><div class="val" id="info-unit">--</div><div class="lbl">單元</div></div>
          <div class="info-box"><div class="val" id="info-lesson">--</div><div class="lbl">堂數</div></div>
          <div class="info-box"><div class="val" id="info-teacher">--</div><div class="lbl">授課老師</div></div>
        </div>
      </div>
    </div>

    <div id="attend-main" style="display:none;">
      <div class="card">
        <button class="mic-btn" id="mic-btn">🎤 開始語音點名</button>
        <div class="status-bar" id="status-bar">選擇堂次後可開始點名</div>
        <div class="summary" id="attend-summary"></div>
        <div class="hint-box">
          🌐 <b>全班：</b>全班到 / 全班缺席 / 全班請假<br>
          🔀 <b>例外：</b>全班到，只有 Amy 缺席 / 除了 Brian 請假，其他都到<br>
          👤 <b>單人：</b>Amy 到了 / Brian 請假 / 缺席 / 遲到 / 補課缺席 / 補課請假<br>
          🔢 <b>分數：</b>Amy 90分 ── 或點分數欄用<b>轉盤</b>輸入
        </div>
      </div>
      <div class="card" style="padding:10px 0;overflow-x:auto;">
        <div id="student-table-wrap"><div class="loading">載入中...</div></div>
      </div>
      <div class="card"><label>辨識紀錄</label><div id="log"></div></div>
    </div>

  </div><!-- /page-attend -->

  <!-- ══ 總表頁 ══════════════════════════════════ -->
  <div class="page" id="page-summary">

    <div class="card">
      <div class="summary-toolbar">
        <div style="flex:1;min-width:150px;">
          <label>選擇班級</label>
          <select id="sum-class-sel"><option value="">請先連線...</option></select>
        </div>
        <div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:1px;">
          <button class="filter-btn active" id="filter-all"    onclick="setFilter('all')">全部</button>
          <button class="filter-btn"        id="filter-makeup" onclick="setFilter('makeup')">⚠️ 未補課</button>
          <button class="filter-btn"        id="filter-hw"     onclick="setFilter('hw')">📝 缺作業</button>
        </div>
      </div>
    </div>

    <!-- 警示卡 -->
    <div class="alert-cards" id="alert-cards" style="display:none;">
      <div class="alert-card makeup">
        <div class="ac-title">⚠️ 尚未補課人次</div>
        <div class="ac-num" id="alert-makeup-num">0</div>
        <div class="ac-sub">缺席(○) 或 請假(△) 未補</div>
      </div>
      <div class="alert-card hw">
        <div class="ac-title">📝 缺作業/分數人次</div>
        <div class="ac-num" id="alert-hw-num">0</div>
        <div class="ac-sub">出席但分數空白</div>
      </div>
    </div>

    <div class="card" style="padding:10px 0;">
      <div id="summary-wrap"><div class="empty">請選擇班級</div></div>
    </div>

  </div><!-- /page-summary -->

</div><!-- /body -->

<!-- 轉盤 Modal -->
<div class="wheel-overlay" id="wheel-overlay" style="display:none;" onclick="wheelOverlayClick(event)">
  <div class="wheel-panel">
    <div class="wheel-header">
      <div class="wheel-student" id="wheel-student-name"></div>
      <button class="wheel-close" onclick="closeWheel()">×</button>
    </div>
    <div class="wheel-display">
      <div class="score-big" id="wheel-score-display">--</div>
      <div class="score-label">分數</div>
    </div>
    <div class="wheel-scroll-wrap">
      <div class="wheel-selector"></div>
      <div class="wheel-scroll" id="wheel-scroll"></div>
    </div>
    <div class="wheel-quick" id="wheel-quick"></div>
    <div class="wheel-actions">
      <button class="wheel-clear"   onclick="clearScore()">清除分數</button>
      <button class="wheel-confirm" onclick="confirmScore()">確認 ✓</button>
    </div>
  </div>
</div>

<script>
// ── 全域 ─────────────────────────────────────────
var API_URL      = localStorage.getItem('nc_api_url') || '';
var classData    = null;
var summaryData  = null;
var availDates   = [];
var recognition  = null;
var isListening  = false;
var lastMatchIdx = -1;
var cbCounter    = 0;
var currentFilter = 'all';
var wheelStudentIdx = -1;
var wheelValue      = null;
var ITEM_HEIGHT     = 52;
var QUICK_SCORES    = [60,70,75,80,85,90,95,100];

var SYMS      = ['V','○','●','△','▲','⊝'];
var SYMCLASS  = {'V':'sel-V','○':'sel-x1','●':'sel-x2','△':'sel-x3','▲':'sel-x4','⊝':'sel-x5'};
var SYM_LABEL = {'V':'到','○':'缺席','●':'補缺','△':'請假','▲':'補假','⊝':'遲到'};
var SYM_BG    = {'V':'#e6f4ea','○':'#fce8e6','●':'#f5cba7','△':'#fef9e7','▲':'#fad7a0','⊝':'#e8f0fe'};
var SYM_COLOR = {'V':'#1e7e34','○':'#c0392b','●':'#ca6f1e','△':'#d4ac0d','▲':'#ca8a04','⊝':'#1a5276'};
var ATT_CLASS = {'V':'att-V','○':'att-o','●':'att-ob','△':'att-d','▲':'att-db','⊝':'att-l'};
var CMD_MAP = [
  { keywords:['補課缺席','補缺'],             sym:'●' },
  { keywords:['補課請假','補假'],             sym:'▲' },
  { keywords:['缺席','沒來','沒到','absent'], sym:'○' },
  { keywords:['請假','leave'],               sym:'△' },
  { keywords:['到了','出席','有來','都到','present','here'], sym:'V' },
  { keywords:['遲到','late'],                sym:'⊝' }
];
var ALL_KEYWORDS    = ['全班','全部','所有人','大家','所有同學'];
var EXCEPT_KEYWORDS = ['只有','除了','但是','除','不包括','排除'];

// ── JSONP ─────────────────────────────────────────
function jsonpCall(params, callback) {
  var cbName = '__ncCb' + (cbCounter++);
  var url = API_URL + '?callback=' + cbName;
  Object.keys(params).forEach(function(k) {
    url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k] === null ? '' : params[k]);
  });
  window[cbName] = function(data) {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    callback(null, data);
  };
  var script = document.createElement('script');
  script.src = url;
  script.onerror = function() {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    callback(new Error('網路錯誤'));
  };
  document.body.appendChild(script);
}

// ── 頁籤切換 ──────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ── 初始化 ────────────────────────────────────────
window.addEventListener('load', function() {
  if (API_URL) document.getElementById('api-url').value = API_URL;
  document.getElementById('class-sel').addEventListener('change', onClassChange);
  document.getElementById('date-sel').addEventListener('change', onDateChange);
  document.getElementById('mic-btn').addEventListener('click', toggleMic);
  document.getElementById('sum-class-sel').addEventListener('change', onSumClassChange);
  if (API_URL) loadClassList();
  buildWheel();
});

function saveApi() {
  var url = document.getElementById('api-url').value.trim();
  if (!url) return;
  API_URL = url;
  localStorage.setItem('nc_api_url', url);
  loadClassList();
}

function loadClassList() {
  var sel1 = document.getElementById('class-sel');
  var sel2 = document.getElementById('sum-class-sel');
  sel1.innerHTML = sel2.innerHTML = '<option value="">載入中...</option>';
  jsonpCall({ action:'getClassList' }, function(err, list) {
    if (err || !list || list.error) {
      sel1.innerHTML = sel2.innerHTML = '<option value="">❌ 連線失敗</option>'; return;
    }
    var opts = '<option value="">請選擇班級...</option>';
    for (var i = 0; i < list.length; i++) opts += '<option value="' + list[i] + '">' + list[i] + '</option>';
    sel1.innerHTML = sel2.innerHTML = opts;
  });
}

// ══ 點名頁 ═══════════════════════════════════════
function onClassChange() {
  var className = document.getElementById('class-sel').value;
  var dateSel   = document.getElementById('date-sel');
  classData = null; availDates = [];
  dateSel.innerHTML = '<option value="">載入中...</option>';
  dateSel.disabled = true;
  document.getElementById('attend-main').style.display = 'none';
  document.getElementById('lesson-info').style.display = 'none';
  if (!className) { dateSel.innerHTML = '<option value="">請先選班級</option>'; return; }

  jsonpCall({ action:'getAvailableDates', className:className }, function(err, dates) {
    if (err || !dates) { dateSel.innerHTML = '<option value="">❌ 讀取失敗</option>'; return; }
    availDates = dates;
    if (!dates.length) { dateSel.innerHTML = '<option value="">（無可用堂次）</option>'; return; }
    var todayMMDD = getTodayMMDD();
    var defaultIdx = 0;
    for (var i = 0; i < dates.length; i++) {
      if (dates[i].dateText.indexOf(todayMMDD) !== -1) { defaultIdx = i; break; }
      if (dates[i].dateText < todayMMDD) defaultIdx = i;
    }
    dateSel.innerHTML = '<option value="">請選擇堂次...</option>';
    for (var i = 0; i < dates.length; i++) {
      var d = dates[i];
      dateSel.innerHTML += '<option value="' + d.colIdx + '">' +
        d.dateText + '　' + d.unit + ' ' + d.lesson.replace(' 點名','') + '　' + (d.teacher||'') + '</option>';
    }
    dateSel.disabled = false;
    dateSel.selectedIndex = defaultIdx + 1;
    onDateChange();
  });
}

function onDateChange() {
  var className = document.getElementById('class-sel').value;
  var colIdx    = parseInt(document.getElementById('date-sel').value);
  if (!className || isNaN(colIdx)) return;
  document.getElementById('student-table-wrap').innerHTML = '<div class="loading">讀取中...</div>';
  document.getElementById('attend-main').style.display = 'block';

  jsonpCall({ action:'getClassDataByCol', className:className, attCol:colIdx }, function(err, data) {
    if (err || !data || data.error) { setStatus((data&&data.error)||'讀取失敗','err'); return; }
    classData = data;
    document.getElementById('info-unit').textContent    = data.unitText    || '--';
    document.getElementById('info-lesson').textContent  = (data.lessonText||'').replace(' 點名','') || '--';
    document.getElementById('info-teacher').textContent = data.teacherText || '--';
    document.getElementById('lesson-info').style.display = 'block';
    setStatus('已載入 ' + data.dateText + ' · 共 ' + data.students.length + ' 位學生', 'ok');
    renderTable(); renderAttSummary();
  });
}

function writeOne(idx, status, score) {
  var st = classData.students[idx];
  if (status !== null && status !== undefined) st.status = status;
  if (score  !== null && score  !== undefined) st.score  = score;
  renderRow(idx); renderAttSummary();
  jsonpCall({
    action:'writeAttendance', className:classData.className,
    studentRow:st.row, attCol:classData.attCol, scoreCol:classData.scoreCol,
    status:(status!==null&&status!==undefined)?status:'',
    score: (score!==null&&score!==undefined)?score:''
  }, function(err,r){ if(!r||!r.ok) addLog('⚠️ 寫入失敗',false); });
}

function writeAll(sym, exceptIndices) {
  if (!classData) return 0;
  var count = 0;
  for (var i = 0; i < classData.students.length; i++) {
    if (exceptIndices && exceptIndices.indexOf(i) !== -1) continue;
    writeOne(i, sym, null); count++;
  }
  return count;
}

function clickStatus(idx, sym) {
  var st = classData.students[idx];
  var newSym = st.status === sym ? '' : sym;
  writeOne(idx, newSym, null);
  addLog(getDisplayName(st) + ' → ' + (newSym||'清除'), true);
}

function getDisplayName(st) { return st.eName || st.cName || ''; }

function renderTable() {
  if (!classData) return;
  var wrap = document.getElementById('student-table-wrap');
  if (!classData.students.length) { wrap.innerHTML = '<div class="empty">無學生資料</div>'; return; }
  var html = '<table><thead><tr><th>學生</th>';
  for (var s = 0; s < SYMS.length; s++) html += '<th>' + SYMS[s] + '</th>';
  html += '<th>分數</th></tr></thead><tbody>';
  for (var i = 0; i < classData.students.length; i++) {
    var st = classData.students[i];
    var nameHtml = st.eName && st.cName
      ? '<div class="name-en">'+st.eName+'</div><div class="name-zh">'+st.cName+'</div>'
      : '<div class="name-en">'+(st.eName||st.cName)+'</div>';
    var hasScore  = st.score !== '' && st.score !== null && st.score !== undefined;
    html += '<tr id="row-'+i+'"'+(i===lastMatchIdx?' class="highlight"':'')+'>';
    html += '<td>'+nameHtml+'</td>';
    for (var j = 0; j < SYMS.length; j++) {
      var sym = SYMS[j];
      html += '<td><button class="sym-btn'+(st.status===sym?' '+SYMCLASS[sym]:'')+'" onclick="clickStatus('+i+',\''+sym+'\')">'+sym+'</button></td>';
    }
    html += '<td><button class="score-btn'+(hasScore?' has-score':'')+'" onclick="openWheel('+i+')">'+(hasScore?st.score:'--')+'</button></td></tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderAttSummary() {
  if (!classData) return;
  var counts = {}; SYMS.forEach(function(s){ counts[s]=0; }); var none = 0;
  classData.students.forEach(function(st){ if(st.status) counts[st.status]++; else none++; });
  var html = '';
  SYMS.forEach(function(sym){ if(counts[sym]) html+='<span class="tag" style="background:'+SYM_BG[sym]+';color:'+SYM_COLOR[sym]+'">'+SYM_LABEL[sym]+' '+counts[sym]+'</span>'; });
  if(none) html+='<span class="tag" style="background:#eee;color:#999">未點 '+none+'</span>';
  document.getElementById('attend-summary').innerHTML = html;
}

function renderRow(idx) {
  var st = classData.students[idx];
  var row = document.getElementById('row-'+idx);
  if (!row) return;
  row.className = (idx===lastMatchIdx)?'highlight':'';
  var btns = row.querySelectorAll('.sym-btn');
  for (var j = 0; j < SYMS.length; j++)
    btns[j].className = 'sym-btn'+(st.status===SYMS[j]?' '+SYMCLASS[SYMS[j]]:'');
  var sb = row.querySelector('.score-btn');
  if (sb) {
    var has = st.score!==''&&st.score!==null&&st.score!==undefined;
    sb.textContent = has?st.score:'--';
    sb.className   = 'score-btn'+(has?' has-score':'');
  }
}

// ══ 總表頁 ═══════════════════════════════════════
function onSumClassChange() {
  var className = document.getElementById('sum-class-sel').value;
  summaryData = null;
  document.getElementById('alert-cards').style.display = 'none';
  document.getElementById('summary-wrap').innerHTML = '<div class="loading">讀取中...</div>';
  if (!className) { document.getElementById('summary-wrap').innerHTML='<div class="empty">請選擇班級</div>'; return; }

  jsonpCall({ action:'getClassSummary', className:className }, function(err, data) {
    if (err || !data || data.error) {
      document.getElementById('summary-wrap').innerHTML = '<div class="empty">讀取失敗</div>'; return;
    }
    summaryData = data;
    renderSummaryTable();
  });
}

function setFilter(f) {
  currentFilter = f;
  ['all','makeup','hw'].forEach(function(id){
    document.getElementById('filter-'+id).classList.toggle('active', id===f);
  });
  if (summaryData) renderSummaryTable();
}

function renderSummaryTable() {
  if (!summaryData) return;
  var data     = summaryData;
  var lessons  = data.lessons;
  var students = data.students;
  var statsH   = data.statsHeaders;

  // 計算警示數字
  var totalMakeup = 0, totalHw = 0;
  students.forEach(function(st){
    if(st.missingMakeup.length) totalMakeup++;
    if(st.missingHw.length)     totalHw++;
  });
  document.getElementById('alert-makeup-num').textContent = totalMakeup;
  document.getElementById('alert-hw-num').textContent     = totalHw;
  document.getElementById('alert-cards').style.display    = 'grid';

  // 過濾學生
  var filtered = students.filter(function(st) {
    if (currentFilter === 'makeup') return st.missingMakeup.length > 0;
    if (currentFilter === 'hw')     return st.missingHw.length > 0;
    return true;
  });

  if (!filtered.length) {
    document.getElementById('summary-wrap').innerHTML = '<div class="empty">✅ 沒有符合條件的學生</div>';
    return;
  }

  // 建表頭
  var html = '<div class="summary-table-wrap"><table class="summary-table"><thead><tr>';
  html += '<th class="name-col">學生</th>';
  for (var l = 0; l < lessons.length; l++) {
    html += '<th title="'+lessons[l].date+' '+lessons[l].teacher+'">' +
            lessons[l].unit+'<br><span style="font-weight:400;opacity:.8">'+lessons[l].lesson+'</span></th>';
  }
  for (var s = 0; s < statsH.length; s++) {
    html += '<th class="stats-col">'+statsH[s].name+'</th>';
  }
  html += '<th class="alert-col">⚠️ 未補課</th>';
  html += '<th class="alert-col">📝 缺作業</th>';
  html += '</tr></thead><tbody>';

  // 建資料列
  for (var i = 0; i < filtered.length; i++) {
    var st = filtered[i];
    var nameCell = st.eName && st.cName
      ? '<div class="name-en" style="font-size:12px">'+st.eName+'</div><div class="name-zh">'+st.cName+'</div>'
      : '<div class="name-en" style="font-size:12px">'+(st.eName||st.cName)+'</div>';

    html += '<tr>';
    html += '<td class="name-col">'+nameCell+'</td>';

    // 課堂記錄
    for (var l = 0; l < lessons.length; l++) {
      var rec = st.lessonRecords[l] || { att:'', score:'' };
      var attCls = ATT_CLASS[rec.att] || '';
      var needMakeup = rec.att==='○'||rec.att==='△';
      var needHw     = rec.att!=='○'&&rec.att!=='△'&&rec.att!=='●'&&rec.att!=='▲'&&rec.score===''&&(rec.att==='V'||rec.att==='⊝'||rec.att==='');
      var cellCls = needMakeup ? 'missing-makeup' : (needHw ? 'missing-hw' : '');
      html += '<td class="'+cellCls+'">';
      if (rec.att) html += '<span class="'+attCls+'">'+rec.att+'</span>';
      if (rec.score) html += '<br><span style="font-size:10px;color:#444">'+rec.score+'</span>';
      if (!rec.att && !rec.score) html += '<span style="color:#ddd">·</span>';
      html += '</td>';
    }

    // 統計欄
    for (var s = 0; s < statsH.length; s++) {
      var val = st.statsValues[s] || '';
      html += '<td class="stats-val">'+val+'</td>';
    }

    // 警示欄
    var mkCls = st.missingMakeup.length ? 'alert-count has-issue' : 'alert-count';
    var hwCls = st.missingHw.length     ? 'alert-count has-issue' : 'alert-count';
    html += '<td class="'+mkCls+'">';
    if (st.missingMakeup.length) html += st.missingMakeup.length + ' 堂<br><span style="font-size:10px;color:#856404">'+st.missingMakeup.slice(0,3).join(' ')+(st.missingMakeup.length>3?'...':'')+'</span>';
    else html += '<span style="color:#ddd">✓</span>';
    html += '</td>';
    html += '<td class="'+hwCls+'">';
    if (st.missingHw.length) html += st.missingHw.length + ' 堂<br><span style="font-size:10px;color:#c0392b">'+st.missingHw.slice(0,3).join(' ')+(st.missingHw.length>3?'...':'')+'</span>';
    else html += '<span style="color:#ddd">✓</span>';
    html += '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  document.getElementById('summary-wrap').innerHTML = html;
}

// ══ 轉盤 ══════════════════════════════════════════
function buildWheel() {
  var scroll = document.getElementById('wheel-scroll');
  var html = '<div class="wheel-item" style="height:64px;"></div><div class="wheel-item" style="height:64px;"></div>';
  for (var i = 0; i <= 100; i++) html += '<div class="wheel-item" data-val="'+i+'" onclick="wheelTap('+i+')">'+i+'</div>';
  html += '<div class="wheel-item" style="height:64px;"></div><div class="wheel-item" style="height:64px;"></div>';
  scroll.innerHTML = html;
  var quick = document.getElementById('wheel-quick');
  var qHtml = '';
  for (var q = 0; q < QUICK_SCORES.length; q++)
    qHtml += '<button class="quick-btn" onclick="wheelTap('+QUICK_SCORES[q]+')">'+QUICK_SCORES[q]+'</button>';
  quick.innerHTML = qHtml;
  scroll.addEventListener('scroll', function() {
    var idx = Math.round(scroll.scrollTop / ITEM_HEIGHT);
    idx = Math.max(0, Math.min(100, idx));
    wheelValue = idx;
    document.getElementById('wheel-score-display').textContent = idx;
    highlightCenter(idx);
  });
}
function highlightCenter(val) {
  document.querySelectorAll('.wheel-item[data-val]').forEach(function(el){
    el.className = 'wheel-item'+(parseInt(el.dataset.val)===val?' center':'');
  });
}
function wheelTap(val) {
  wheelValue = val;
  document.getElementById('wheel-score-display').textContent = val;
  highlightCenter(val);
  document.getElementById('wheel-scroll').scrollTo({ top:val*ITEM_HEIGHT, behavior:'smooth' });
}
function openWheel(idx) {
  wheelStudentIdx = idx;
  var st = classData.students[idx];
  document.getElementById('wheel-student-name').textContent =
    (st.eName||'') + (st.eName&&st.cName?'　':'') + (st.cName||'');
  document.getElementById('wheel-overlay').style.display = 'flex';
  var initVal = st.score!=='' ? parseInt(st.score) : 80;
  if (isNaN(initVal)) initVal = 80;
  wheelValue = initVal;
  document.getElementById('wheel-score-display').textContent = initVal;
  highlightCenter(initVal);
  setTimeout(function(){ document.getElementById('wheel-scroll').scrollTop = initVal*ITEM_HEIGHT; }, 50);
}
function closeWheel() { document.getElementById('wheel-overlay').style.display='none'; wheelStudentIdx=-1; }
function wheelOverlayClick(e) { if(e.target===document.getElementById('wheel-overlay')) closeWheel(); }
function confirmScore() {
  if(wheelStudentIdx===-1||wheelValue===null) return;
  var st = classData.students[wheelStudentIdx];
  writeOne(wheelStudentIdx, null, String(wheelValue));
  addLog(getDisplayName(st)+' 分數 → '+wheelValue, true);
  setStatus('✅ '+getDisplayName(st)+' 分數 → '+wheelValue+' 分','ok');
  closeWheel();
}
function clearScore() {
  if(wheelStudentIdx===-1) return;
  var st = classData.students[wheelStudentIdx];
  writeOne(wheelStudentIdx, null, '');
  addLog(getDisplayName(st)+' 分數清除', true);
  setStatus('✅ '+getDisplayName(st)+' 分數已清除','ok');
  closeWheel();
}

// ══ 語音辨識 ══════════════════════════════════════
function toggleMic() {
  if(isListening){stopMic();return;}
  var SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('❌ 請改用 Chrome','err');return;}
  if(!classData){setStatus('❌ 請先選班級與堂次','err');return;}
  recognition = new SR();
  recognition.lang='zh-TW'; recognition.continuous=true; recognition.interimResults=false;
  recognition.onstart=function(){
    isListening=true;
    document.getElementById('mic-btn').className='mic-btn listening';
    document.getElementById('mic-btn').textContent='🔴 聆聽中... (再按停止)';
    setStatus('聆聽中 ── 可說「全班到」「Amy 缺席」「Brian 90分」','info');
  };
  recognition.onresult=function(e){
    var text=e.results[e.results.length-1][0].transcript.trim();
    addLog('🎙 '+text,true); processVoice(text);
  };
  recognition.onerror=function(e){setStatus('錯誤：'+e.error,'err');stopMic();};
  recognition.onend=function(){if(isListening)recognition.start();};
  recognition.start();
}
function stopMic(){
  isListening=false; if(recognition)recognition.stop();
  document.getElementById('mic-btn').className='mic-btn';
  document.getElementById('mic-btn').textContent='🎤 開始語音點名';
  setStatus('已停止聆聽','');
}
function processVoice(text) {
  if(!classData) return;
  var lower=text.toLowerCase().replace(/\s/g,'');
  var isAllCmd=false;
  for(var a=0;a<ALL_KEYWORDS.length;a++) if(lower.indexOf(ALL_KEYWORDS[a])!==-1){isAllCmd=true;break;}
  if(isAllCmd){
    var allSym=detectSym(lower);
    if(!allSym){setStatus('❓ 全班指令：聽不出狀態','err');return;}
    var hasExcept=false;
    for(var ex=0;ex<EXCEPT_KEYWORDS.length;ex++) if(lower.indexOf(EXCEPT_KEYWORDS[ex])!==-1){hasExcept=true;break;}
    var exceptList=[];
    if(hasExcept){
      for(var i=0;i<classData.students.length;i++){
        if(studentMatchesText(i,lower)){
          var afterText='';
          for(var ex2=0;ex2<EXCEPT_KEYWORDS.length;ex2++){var pos=text.indexOf(EXCEPT_KEYWORDS[ex2]);if(pos!==-1){afterText=text.substring(pos).toLowerCase().replace(/\s/g,'');break;}}
          var exSym=detectSym(afterText)||(allSym==='V'?'○':'V');
          exceptList.push({idx:i,sym:exSym});
        }
      }
    }
    var exceptIdxArr=exceptList.map(function(e){return e.idx;});
    var count=writeAll(allSym,exceptIdxArr);
    for(var e=0;e<exceptList.length;e++) writeOne(exceptList[e].idx,exceptList[e].sym,null);
    var msg='✅ 全班 '+count+' 人 → '+SYM_LABEL[allSym];
    if(exceptList.length) msg+='　例外：'+exceptList.map(function(e){return getDisplayName(classData.students[e.idx])+'('+SYM_LABEL[e.sym]+')';}).join('、');
    setStatus(msg,'ok'); addLog(msg,true); return;
  }
  var matchIdx=findStudent(lower);
  var scoreMatch=text.match(/(\d+)\s*分/);
  if(scoreMatch&&matchIdx!==-1){
    lastMatchIdx=matchIdx; var st=classData.students[matchIdx];
    writeOne(matchIdx,null,scoreMatch[1]);
    setStatus('✅ '+getDisplayName(st)+' 分數 → '+scoreMatch[1]+' 分','ok');
    addLog(getDisplayName(st)+' 分數 '+scoreMatch[1],true); return;
  }
  if(matchIdx!==-1){
    lastMatchIdx=matchIdx; var st=classData.students[matchIdx];
    var sym=detectSym(lower);
    if(!sym){setStatus('❓ 聽到「'+getDisplayName(st)+'」但聽不出指令','err');renderRow(matchIdx);return;}
    writeOne(matchIdx,sym,null);
    setStatus('✅ '+getDisplayName(st)+' → '+sym+'（'+SYM_LABEL[sym]+'）','ok');
    addLog(getDisplayName(st)+' → '+sym,true); return;
  }
  setStatus('❓ 找不到學生名字，再說一次？','err');
}
function findStudent(lower){
  var s=classData.students;
  for(var i=0;i<s.length;i++){var e=s[i].eName.toLowerCase().replace(/\s/g,'');if(e&&lower.indexOf(e)!==-1)return i;}
  for(var i=0;i<s.length;i++){if(s[i].cName&&lower.indexOf(s[i].cName)!==-1)return i;}
  for(var i=0;i<s.length;i++){var f=s[i].eName.split(' ')[0].toLowerCase();if(f.length>=2&&lower.indexOf(f)!==-1)return i;}
  return -1;
}
function studentMatchesText(idx,lower){
  var st=classData.students[idx];
  var e=st.eName.toLowerCase().replace(/\s/g,'');
  var f=st.eName.split(' ')[0].toLowerCase();
  return (e&&lower.indexOf(e)!==-1)||(st.cName&&lower.indexOf(st.cName)!==-1)||(f.length>=2&&lower.indexOf(f)!==-1);
}
function detectSym(lower){
  for(var c=0;c<CMD_MAP.length;c++) for(var k=0;k<CMD_MAP[c].keywords.length;k++) if(lower.indexOf(CMD_MAP[c].keywords[k])!==-1) return CMD_MAP[c].sym;
  return null;
}
function getTodayMMDD(){var now=new Date();return('0'+(now.getMonth()+1)).slice(-2)+'/'+('0'+now.getDate()).slice(-2);}
function setStatus(msg,type){var el=document.getElementById('status-bar');el.textContent=msg;el.className='status-bar'+(type?' '+type:'');}
function addLog(msg,ok){var log=document.getElementById('log');var t=new Date().toLocaleTimeString('zh-TW');log.innerHTML='<div class="log-item">['+t+'] '+(ok!==false?'✅':'❌')+' '+msg+'</div>'+log.innerHTML;}
</script>
