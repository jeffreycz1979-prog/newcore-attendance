<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NewCore 語音點名</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; font-size: 14px; }
  .top { background: #274e13; color: white; padding: 12px 18px; display: flex; align-items: center; gap: 12px; }
  .top h2 { font-size: 15px; font-weight: 700; flex: 1; }
  .tab-bar { display: flex; }
  .tab-btn { padding: 6px 14px; font-size: 13px; border: none; cursor: pointer; background: rgba(255,255,255,0.15); color: white; border-radius: 6px; margin-left: 6px; }
  .tab-btn.active { background: white; color: #274e13; font-weight: 700; }
  .body { padding: 14px; max-width: 900px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 5px; }
  select { width: 100%; padding: 9px 10px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; color: #222; }
  .lesson-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
  .info-box { background: #f8f9fa; border-radius: 8px; padding: 8px 10px; text-align: center; }
  .info-box .val { font-size: 15px; font-weight: 700; color: #274e13; }
  .info-box .lbl { font-size: 10px; color: #999; margin-top: 2px; }
  .mic-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 700; border-radius: 10px; border: none; background: #274e13; color: white; cursor: pointer; margin-bottom: 10px; }
  .mic-btn.listening { background: #c0392b; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
  .status-bar { text-align: center; padding: 9px 12px; border-radius: 8px; font-size: 12px; background: #eee; color: #666; min-height: 36px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
  .status-bar.ok { background: #e6f4ea; color: #1e7e34; }
  .status-bar.err { background: #fce8e6; color: #c0392b; }
  .status-bar.info { background: #e8f0fe; color: #1a5276; }
  .hint-box { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 11px; color: #888; line-height: 1.9; }
  .hint-box b { color: #274e13; }
  .att-summary { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 4px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .att-table { width: 100%; border-collapse: collapse; }
  .att-table th { background: #f1f3f4; font-size: 11px; font-weight: 700; padding: 8px 4px; text-align: center; color: #666; }
  .att-table th:first-child { text-align: left; padding-left: 10px; min-width: 110px; }
  .att-table td { padding: 7px 4px; font-size: 13px; text-align: center; border-bottom: 1px solid #f5f5f5; }
  .att-table td:first-child { text-align: left; padding-left: 10px; }
  .name-en { font-weight: 600; font-size: 13px; color: #222; }
  .name-zh { font-size: 11px; color: #999; margin-top: 1px; }
  .sym-btn { width: 28px; height: 26px; border-radius: 5px; border: 1px solid #e0e0e0; background: white; font-size: 13px; cursor: pointer; }
  .sym-btn.sel-V { background: #e6f4ea; border-color: #1e7e34; font-weight: 700; }
  .sym-btn.sel-x1 { background: #fce8e6; border-color: #c0392b; font-weight: 700; }
  .sym-btn.sel-x2 { background: #f5cba7; border-color: #ca6f1e; font-weight: 700; }
  .sym-btn.sel-x3 { background: #fef9e7; border-color: #d4ac0d; font-weight: 700; }
  .sym-btn.sel-x4 { background: #fad7a0; border-color: #ca8a04; font-weight: 700; }
  .sym-btn.sel-x5 { background: #e8f0fe; border-color: #1a5276; font-weight: 700; }
  .score-btn { width: 46px; height: 26px; border-radius: 5px; border: 1px solid #ddd; background: #fafafa; font-size: 12px; cursor: pointer; color: #444; font-weight: 500; }
  .score-btn.has-score { background: #e8f0fe; border-color: #185FA5; color: #185FA5; font-weight: 700; }
  .log-item { font-size: 11px; color: #888; padding: 3px 0; border-bottom: 1px solid #f5f5f5; }
  .empty { text-align: center; color: #bbb; padding: 24px 0; font-size: 13px; }
  .loading { text-align: center; color: #aaa; padding: 20px; }
  .api-bar { background: #fff8e1; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .api-bar input { flex: 1; min-width: 200px; padding: 7px 10px; font-size: 11px; border-radius: 6px; border: 1px solid #ddd; font-family: monospace; }
  .api-bar button { padding: 7px 16px; font-size: 13px; border-radius: 6px; border: none; background: #274e13; color: white; cursor: pointer; }

  /* 轉盤 & 總表樣式略... (保持與原版一致) */
  .wheel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
  .wheel-panel { background: white; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 0 0 24px; animation: slideUp .25s ease; }
  .wheel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid #f0f0f0; }
  .wheel-student { font-size: 15px; font-weight: 700; }
  .wheel-close { font-size: 22px; color: #aaa; cursor: pointer; background: none; border: none; padding: 0 4px; }
  .wheel-display { text-align: center; padding: 12px 0 4px; }
  .wheel-display .score-big { font-size: 52px; font-weight: 700; color: #274e13; line-height: 1; }
  .wheel-display .score-label { font-size: 13px; color: #aaa; margin-top: 4px; }
  .wheel-scroll-wrap { position: relative; height: 180px; overflow: hidden; margin: 8px 20px; border-radius: 12px; background: #f8f9fa; }
  .wheel-selector { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:52px; border-top:2px solid #274e13; border-bottom:2px solid #274e13; z-index:3; pointer-events:none; }
  .wheel-scroll { height:100%; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .wheel-scroll::-webkit-scrollbar { display:none; }
  .wheel-item { height:52px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:600; color:#bbb; scroll-snap-align:center; cursor:pointer; }
  .wheel-item.center { color:#274e13; }
  .wheel-quick { display:flex; gap:8px; flex-wrap:wrap; padding:12px 20px 0; }
  .quick-btn { flex:1; min-width:48px; padding:8px 4px; border-radius:8px; border:1px solid #ddd; background:#f8f9fa; font-size:13px; font-weight:600; cursor:pointer; text-align:center; color:#444; }
  .wheel-actions { display:flex; gap:10px; padding:14px 20px 0; }
  .wheel-clear { flex:1; padding:12px; border-radius:10px; border:1px solid #ddd; background:white; font-size:14px; cursor:pointer; color:#c0392b; }
  .wheel-confirm { flex:2; padding:12px; border-radius:10px; border:none; background:#274e13; color:white; font-size:14px; font-weight:700; cursor:pointer; }
  .att-popup { position: fixed; z-index: 2000; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 10px; display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
  .att-popup-item { padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .summary-table-wrap { overflow-x: auto; }
  .summary-table { border-collapse: collapse; font-size: 12px; white-space: nowrap; width: 100%; }
  .summary-table th { background: #274e13; color: white; padding: 6px 8px; text-align: center; font-size: 11px; font-weight: 600; position: sticky; top: 0; z-index: 2; }
  .summary-table td { padding: 5px 6px; text-align: center; border-bottom: 1px solid #f0f0f0; }
  .save-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #274e13; color: white; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 3000; animation: fadeInOut 1.8s ease forwards; }
</style>
</head>
<body>

<div class="top">
  <h2>🎤 NewCore 點名系統</h2>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('attend',this)">點名</button>
    <button class="tab-btn" onclick="switchTab('summary',this)">總表</button>
  </div>
</div>

<div class="body">
  <div class="api-bar">
    <input type="text" id="api-url" placeholder="貼上 Apps Script /exec 網址" />
    <button onclick="saveApi()">連線</button>
  </div>

  <div class="page active" id="page-attend">
    <div class="card">
      <div class="row2">
        <div><label>班級</label><select id="class-sel"><option value="">請先連線...</option></select></div>
        <div><label>堂次 / 日期</label><select id="date-sel" disabled><option value="">請先選班級</option></select></div>
      </div>
    </div>
    <div id="attend-main" style="display:none;">
      <div class="card">
        <button class="mic-btn" id="mic-btn">🎤 開始語音點名</button>
        <div class="status-bar" id="status-bar">選擇堂次後可開始點名</div>
      </div>
      <div class="card" style="padding:10px 0;overflow-x:auto;">
        <div id="student-table-wrap"></div>
      </div>
      <div class="card"><label>辨識紀錄</label><div id="log"></div></div>
    </div>
  </div>

  <div class="page" id="page-summary">
    <div class="card">
      <select id="sum-class-sel" onchange="onSumClassChange()"><option value="">請選擇班級...</option></select>
    </div>
    <div id="summary-wrap"></div>
  </div>
</div>

<div class="wheel-overlay" id="wheel-overlay" style="display:none;" onclick="wheelOverlayClick(event)">
  <div class="wheel-panel">
    <div class="wheel-header"><div class="wheel-student" id="wheel-student-name"></div><button class="wheel-close" onclick="closeWheel()">×</button></div>
    <div class="wheel-display"><div class="score-big" id="wheel-score-display">--</div></div>
    <div class="wheel-scroll-wrap"><div class="wheel-selector"></div><div class="wheel-scroll" id="wheel-scroll"></div></div>
    <div class="wheel-actions"><button class="wheel-clear" onclick="clearScore()">清除</button><button class="wheel-confirm" onclick="confirmScore()">確認</button></div>
  </div>
</div>
<div id="att-popup" class="att-popup" style="display:none;"></div>

<script>
// --- 全域變數 ---
var API_URL = localStorage.getItem('nc_api_url') || '';
var classData = null;
var summaryData = null;
var cbCounter = 0;
var isListening = false;
var mediaRecorder;
var audioChunks = [];
var SYMS = ['V','○','●','△','▲','⊝'];
var SYMCLASS = {'V':'sel-V','○':'sel-x1','●':'sel-x2','△':'sel-x3','▲':'sel-x4','⊝':'sel-x5'};
var SYM_COLOR = {'V':'#1e7e34','○':'#c0392b','●':'#ca6f1e','△':'#d4ac0d','▲':'#ca8a04','⊝':'#1a5276'};
var ITEM_HEIGHT = 52;

// --- 初始化 ---
window.addEventListener('load', function() {
  if (API_URL) {
    document.getElementById('api-url').value = API_URL;
    loadClassList();
  }
  document.getElementById('class-sel').addEventListener('change', onClassChange);
  document.getElementById('date-sel').addEventListener('change', onDateChange);
  document.getElementById('mic-btn').addEventListener('click', toggleMic);
  buildWheel();
});

// --- 連線功能 ---
function saveApi() {
  var url = document.getElementById('api-url').value.trim();
  if (!url) { alert("請貼上網址"); return; }
  API_URL = url;
  localStorage.setItem('nc_api_url', url);
  loadClassList();
}

function loadClassList() {
  var s1 = document.getElementById('class-sel');
  var s2 = document.getElementById('sum-class-sel');
  s1.innerHTML = s2.innerHTML = '<option>載入中...</option>';
  jsonpCall({ action: 'getClassList' }, function(err, list) {
    if (err || !list || list.error) { s1.innerHTML = '❌ 失敗'; return; }
    var opts = '<option value="">請選擇班級...</option>';
    list.forEach(function(n) { opts += '<option value="'+n+'">'+n+'</option>'; });
    s1.innerHTML = s2.innerHTML = opts;
    showToast("✅ 連線成功");
  });
}

// --- 語音 & Gemini (修正 URL 過長問題) ---
function toggleMic() {
  if (isListening) { stopMic(); return; }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    // 關鍵修正：降低 bitsPerSecond 確保 Base64 縮短到網址塞得下
    mediaRecorder = new MediaRecorder(stream, { audioBitsPerSecond: 16000 });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const reader = new FileReader();
      reader.readAsDataURL(new Blob(audioChunks));
      reader.onloadend = () => {
        const base64Data = reader.result.split(',')[1];
        if (base64Data.length > 7000) {
          setStatus('⚠️ 錄音太長，請縮短至 2 秒內', 'err');
          return;
        }
        sendToGemini(base64Data);
      };
    };
    mediaRecorder.start();
    isListening = true;
    document.getElementById('mic-btn').className = 'mic-btn listening';
    document.getElementById('mic-btn').textContent = '🔴 錄音中 (按我停止)';
    setStatus('錄製中，說完請快按停止...', 'info');
  });
}

function stopMic() {
  if (mediaRecorder) mediaRecorder.stop();
  isListening = false;
  document.getElementById('mic-btn').className = 'mic-btn';
  document.getElementById('mic-btn').textContent = '🎤 開始語音點名';
  setStatus('🤖 Gemini 辨識中...', 'info');
}

function sendToGemini(base64) {
  var cls = document.getElementById('class-sel').value;
  var col = document.getElementById('date-sel').value;
  jsonpCall({ action:'processVoice', className:cls, attCol:col, audioData:base64 }, function(err, res) {
    if (err || (res && res.error)) { setStatus('❌ 辨識失敗：資料過長或網路錯誤', 'err'); return; }
    var joke = (res.data && res.data[0]) ? res.data[0].comment : "完成！";
    alert("🤖 Gemini 評論：\n" + joke);
    setStatus(res.msg, 'ok');
    onDateChange();
  });
}

// --- 資料處理 ---
function onClassChange() {
  var cls = document.getElementById('class-sel').value;
  jsonpCall({ action: 'getAvailableDates', className: cls }, function(err, dates) {
    var sel = document.getElementById('date-sel');
    sel.innerHTML = '<option value="">選擇日期...</option>';
    dates.forEach(function(d) { sel.innerHTML += '<option value="'+d.colIdx+'">'+d.dateText+'</option>'; });
    sel.disabled = false;
  });
}

function onDateChange() {
  var cls = document.getElementById('class-sel').value;
  var col = document.getElementById('date-sel').value;
  document.getElementById('attend-main').style.display = 'block';
  jsonpCall({ action: 'getClassDataByCol', className: cls, attCol: col }, function(err, data) {
    classData = data;
    renderTable();
  });
}

function renderTable() {
  var html = '<table class="att-table"><thead><tr><th>學生</th>';
  SYMS.forEach(function(s) { html += '<th>'+s+'</th>'; });
  html += '<th>分數</th></tr></thead><tbody>';
  classData.students.forEach(function(st, i) {
    var displayName = st.displayName || st.eName || st.cName;
    html += '<tr><td>'+displayName+'</td>';
    SYMS.forEach(function(s) {
      var sel = st.status === s ? ' '+SYMCLASS[s] : '';
      html += '<td><button class="sym-btn'+sel+'" onclick="updateSt('+i+',\''+s+'\')">'+s+'</button></td>';
    });
    html += '<td>'+(st.score || '--')+'</td></tr>';
  });
  document.getElementById('student-table-wrap').innerHTML = html + '</tbody></table>';
}

function updateSt(i, s) {
  var st = classData.students[i];
  jsonpCall({ action: 'writeAttendance', className: classData.className, studentRow: st.row, attCol: classData.attCol, status: s }, function() {
    onDateChange();
  });
}

// --- 總表補回功能 (修正無畫面問題) ---
function onSumClassChange() {
  var cls = document.getElementById('sum-class-sel').value;
  var wrap = document.getElementById('summary-wrap');
  if (!cls) { wrap.innerHTML = '<div class="empty">請選擇班級</div>'; return; }
  wrap.innerHTML = '<div class="loading">正在讀取全班總表...</div>';
  jsonpCall({ action: 'getClassSummary', className: cls }, function(err, data) {
    if (err || !data || data.error) { 
      wrap.innerHTML = '<div class="empty">讀取失敗：' + (data ? data.error : '網路錯誤') + '</div>'; 
      return; 
    }
    summaryData = data;
    renderSummaryTable();
  });
}

function renderSummaryTable() {
  if (!summaryData) return;
  var lessons = summaryData.lessons || [];
  var students = summaryData.students || [];
  var wrap = document.getElementById('summary-wrap');
  
  var html = '<div class="summary-table-wrap"><table class="summary-table"><thead><tr>';
  html += '<th style="position:sticky; left:0; background:#274e13; z-index:3; min-width:80px; color:white;">學生</th>';
  
  lessons.forEach(function(l) {
    html += '<th>' + (l.unit || '') + '<br><span style="font-weight:400; font-size:10px;">' + (l.lesson || '') + '</span></th>';
  });
  html += '</tr></thead><tbody>';

  students.forEach(function(st) {
    html += '<tr>';
    html += '<td style="position:sticky; left:0; background:white; z-index:1; font-weight:600; border-right:1px solid #eee;">' + (st.displayName || st.eName || st.cName) + '</td>';
    
    if (st.lessonRecords) {
      st.lessonRecords.forEach(function(rec) {
        var att = rec.att || '·';
        var score = rec.score || '-';
        var color = SYM_COLOR[att] || '#999';
        html += '<td><span style="font-weight:700; color:' + color + ';">' + att + '</span><br><span style="font-size:10px; color:#aaa;">' + score + '</span></td>';
      });
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  wrap.innerHTML = html;
}

// --- 工具 ---
function jsonpCall(p, cb) {
  var name = '__nc' + cbCounter++;
  window[name] = function(d) { delete window[name]; document.body.removeChild(sc); cb(null, d); };
  var sc = document.createElement('script');
  var url = API_URL + '?callback=' + name;
  Object.keys(p).forEach(function(k) { url += '&' + k + '=' + encodeURIComponent(p[k]); });
  sc.src = url;
  document.body.appendChild(sc);
}

function switchTab(t, b) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active'); b.classList.add('active');
}

function setStatus(m, t) { var e = document.getElementById('status-bar'); e.textContent = m; e.className = 'status-bar ' + t; }
function showToast(m) { var t = document.createElement('div'); t.className = 'save-toast'; t.textContent = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
function buildWheel() { /* 轉盤邏輯可保持現狀 */ }
function openWheel() { /* 轉盤邏輯可保持現狀 */ }
function closeWheel() { document.getElementById('wheel-overlay').style.display='none'; }
function wheelOverlayClick(e) { if(e.target.id==='wheel-overlay') closeWheel(); }
</script>
</body>
</html>
