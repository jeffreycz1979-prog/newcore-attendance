<!DOCTYPE html>

<head>

<title>NewCore 語音點名</title>
<style>

  .name-zh { font-size: 11px; color: #999; margin-top: 1px; }

  .sym-btn.sel-x1 { background: #fce8e6; border-color: #c0392b; font-weight: 700; }
  .sym-btn.sel-x2 { background: #f5cba7; border-color: #ca6f1e; font-weight: 700; }
  .sym-btn.sel-x3 { background: #fef9e7; border-color: #d4ac0d; font-weight: 700; }
  .sym-btn.sel-x4 { background: #fad7a0; border-color: #ca8a04; font-weight: 700; }
  .sym-btn.sel-x5 { background: #e8f0fe; border-color: #1a5276; font-weight: 700; }

  .score-btn.has-score { background: #e8f0fe; border-color: #185FA5; color: #185FA5; font-weight: 700; }
  .log-item { font-size: 11px; color: #888; padding: 3px 0; border-bottom: 1px solid #f5f5f5; }
  .empty   { text-align: center; color: #bbb; padding: 24px 0; font-size: 13px; }
  .loading { text-align: center; color: #aaa; padding: 20px; }
  .wheel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
  .wheel-panel { background: white; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 0 0 24px; animation: slideUp .25s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .wheel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid #f0f0f0; }
  .wheel-student { font-size: 15px; font-weight: 700; }
  .wheel-close { font-size: 22px; color: #aaa; cursor: pointer; background: none; border: none; padding: 0 4px; }
  .wheel-display { text-align: center; padding: 12px 0 4px; }
  .wheel-display .score-big { font-size: 52px; font-weight: 700; color: #274e13; line-height: 1; }
  .wheel-display .score-label { font-size: 13px; color: #aaa; margin-top: 4px; }
  .wheel-scroll-wrap { position: relative; height: 180px; overflow: hidden; margin: 8px 20px; border-radius: 12px; background: #f8f9fa; }
  .wheel-scroll-wrap::before,.wheel-scroll-wrap::after { content:''; position:absolute; left:0; right:0; height:60px; z-index:2; pointer-events:none; }
  .wheel-scroll-wrap::before { top:0; background:linear-gradient(to bottom,#f8f9fa,transparent); }
  .wheel-scroll-wrap::after  { bottom:0; background:linear-gradient(to top,#f8f9fa,transparent); }
  .wheel-selector { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:52px; border-top:2px solid #274e13; border-bottom:2px solid #274e13; z-index:3; pointer-events:none; }
  .wheel-scroll { height:100%; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .wheel-scroll::-webkit-scrollbar { display:none; }
  .wheel-item { height:52px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:600; color:#bbb; scroll-snap-align:center; cursor:pointer; }
  .wheel-item.center { color:#274e13; }
  .wheel-quick { display:flex; gap:8px; flex-wrap:wrap; padding:12px 20px 0; }

  .wheel-confirm { flex:2; padding:12px; border-radius:10px; border:none; background:#274e13; color:white; font-size:14px; font-weight:700; cursor:pointer; }
  .att-popup { position: fixed; z-index: 2000; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 10px; display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
  .att-popup-item { padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .att-popup-item:hover { background: #f0f2f5; }
  .att-popup-item.selected { background: #e6f4ea; }
  .att-popup-divider { height: 1px; background: #f0f0f0; margin: 2px 0; }
  .summary-toolbar { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; margin-bottom:12px; }
  .summary-toolbar select { width:auto; flex:1; min-width:150px; }
  .filter-btn { padding:7px 14px; font-size:12px; border-radius:8px; border:1px solid #ddd; background:white; cursor:pointer; color:#444; white-space:nowrap; }
  .filter-btn.active { background:#274e13; color:white; border-color:#274e13; }
  .alert-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }

  .alert-card.hw      { background:#fce8e6; border:1px solid #f5c6cb; }

  .alert-card .ac-sub { font-size:11px; color:#888; margin-top:2px; }
  .summary-table-wrap { overflow: auto; max-height: 75vh; }

  .summary-table th { background: #274e13; color: white; padding: 6px 8px; text-align: center; font-size: 11px; font-weight: 600; position: sticky; top: 0; z-index: 2; }

  .summary-table th.alert-col { background: #7b1c1c; }

  .cell-att { cursor: pointer; border-radius: 4px; padding: 2px 4px; transition: background .15s; }

  .cell-score:hover { background: #e8f0fe; outline: 2px solid #274e13; }
  .cell-score.has-score { color: #185FA5; font-weight: 700; }
  .att-V  { color: #1e7e34; font-weight: 700; }
  .att-o  { color: #c0392b; font-weight: 700; }
  .att-ob { color: #ca6f1e; font-weight: 700; }
  .att-d  { color: #d4ac0d; font-weight: 700; }
  .att-db { color: #ca8a04; font-weight: 700; }

  .report-toolbar { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; margin-bottom:12px; }
  .report-toolbar select { width:auto; flex:1; min-width:150px; }

  .rpt-btn:disabled { opacity:.5; cursor:not-allowed; }

  .exam-tab.test   { border-color:#7d3c98; color:#7d3c98; }

  .exam-table tr:last-child td { border-bottom:none; }
  .exam-table tr:hover td { background:#fffde7; }

  .exam-save-info { font-size:12px; color:#888; flex:1; }
  .overview-toolbar { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-bottom:14px; }
  .overview-toolbar select { width:auto; flex:1; min-width:150px; }
  .threshold-box { display:flex; align-items:center; gap:6px; }
  .threshold-box label { font-size:11px; color:#888; white-space:nowrap; margin:0; }
  .threshold-input { width:64px; padding:8px 8px; border:1px solid #ddd; border-radius:8px; font-size:14px; font-weight:700; text-align:center; color:#274e13; }
  .class-card { background:white; border-radius:12px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,.08); overflow:hidden; }
  .class-card-header { background:#274e13; color:white; padding:10px 16px; display:flex; align-items:center; gap:10px; }
  .class-card-header h4 { font-size:14px; font-weight:700; flex:1; margin:0; }
  .class-card-badge { background:rgba(255,255,255,0.2); border-radius:10px; padding:2px 10px; font-size:11px; }
  .class-card-badge.warn { background:#f39c12; }
  .class-card-badge.ok   { background:rgba(255,255,255,0.15); }
  .class-card-body { padding:12px 16px; }
  .alert-section-title { font-size:11px; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:.04em; margin:10px 0 6px; }
  .alert-section-title:first-child { margin-top:0; }
  .alert-row { display:flex; align-items:flex-start; gap:10px; padding:5px 0; border-bottom:1px solid #f5f5f5; font-size:12px; }
  .alert-row:last-child { border-bottom:none; }
  .alert-name { font-weight:700; min-width:80px; color:#222; }
  .alert-detail { color:#666; flex:1; line-height:1.6; }
  .alert-score { font-weight:700; color:#c0392b; min-width:36px; text-align:right; }
  .no-alert { color:#bbb; font-size:12px; padding:6px 0; }
  .overview-loading { text-align:center; color:#aaa; padding:30px; }
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">🎤</div>
    <div class="login-title">NewCore</div>
    <div class="login-sub">補習班管理系統</div>
    <div class="login-field">
      <label>授權碼</label>
      <input type="password" id="login-code" placeholder="請輸入授權碼" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-api">
      <label>GAS API 網址</label>
      <input type="text" id="login-api-url" placeholder="https://script.google.com/macros/s/...">
    </div>
  </div>
</div>

<div id="main-screen" style="display:none;">
<div class="top">
  <h2>🎤 NewCore</h2>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('attend',this)">點名</button>
    <button class="tab-btn" onclick="switchTab('summary',this)">總表</button>
    <button class="tab-btn" onclick="switchTab('report',this)">成績單</button>
    <button class="tab-btn" onclick="switchTab('exam',this)">考試成績</button>
    <button class="tab-btn" id="tab-overview" style="display:none;" onclick="switchTab('overview',this)">📊 總覽</button>
  </div>
</div>

<div class="auth-bar">
  <span>👤</span>
  <span class="auth-name" id="auth-name-display">--</span>
  <span class="auth-role" id="auth-role-display">--</span>
  <button class="auth-logout" onclick="doLogout()">登出</button>
</div>

<div class="body">
  <div class="page active" id="page-attend">
    <div class="card">
      <div class="row2">
        <div><label>班級</label><select id="class-sel"><option value="">請先選班級...</option></select></div>
        <div><label>堂次 / 日期</label><select id="date-sel" disabled><option value="">請先選班級</option></select></div>
      </div>
      <div id="lesson-info" style="display:none;">
        <div class="lesson-info">
          <div class="info-box"><div class="val" id="info-unit">--</div><div class="lbl">單元</div></div>
          <div class="info-box"><div class="val" id="info-lesson">--</div><div class="lbl">堂數</div></div>
          <div class="info-box"><div class="val" id="info-teacher">--</div><div class="lbl">授課老師</div></div>
        </div>
      </div>
    </div>
    <div id="attend-main" style="display:none;">
      <div class="card">
        <div class="mic-row">
          <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤 開始錄音點名</button>
          <div class="rec-timer" id="rec-timer" style="display:none;">0s</div>
        </div>
        <div class="status-bar" id="status-bar">選擇堂次後可開始點名</div>
        <div class="att-summary" id="attend-summary"></div>
        <div class="gemini-result" id="gemini-result"><div class="gr-title">🤖 Gemini 辨識結果</div><div id="gemini-items"></div></div>
        <div class="hint-box">🎙 <b>錄音指令範例：</b>全班到、Amy 缺席、Brian 請假、Amy 90分</div>
      </div>
      <div class="card" style="padding:10px 0;"><div id="student-table-wrap"></div></div>
      <div class="card"><label>辨識紀錄</label><div id="log"></div></div>
    </div>
  </div>

  <div class="page" id="page-summary">
    <div class="card">
      <div class="summary-toolbar">
        <div style="flex:1;"><label>選擇班級</label><select id="sum-class-sel"><option value="">請先選班級...</option></select></div>
        <div style="display:flex;gap:6px;"><button class="filter-btn active" id="filter-all" onclick="setFilter('all')">全部</button><button class="filter-btn" id="filter-makeup" onclick="setFilter('makeup')">⚠️ 未補課</button></div>
      </div>
    </div>
    <div class="alert-cards" id="alert-cards" style="display:none;">
      <div class="alert-card makeup"><div class="ac-title">尚未補課人次</div><div class="ac-num" id="alert-makeup-num">0</div></div>
      <div class="alert-card hw"><div class="ac-title">缺作業人次</div><div class="ac-num" id="alert-hw-num">0</div></div>
    </div>
    <div class="card" style="padding:10px 0;"><div id="summary-wrap"></div></div>
  </div>

  <div class="page" id="page-exam">
    <div class="card"><label>選擇班級</label><select id="exam-class-sel" onchange="onExamClassChange()"></select></div>
    <div id="exam-main" style="display:none;" class="card">
      <div class="exam-tab-row" id="exam-tab-row"></div>
      <div id="exam-stats" style="margin-bottom:10px; font-size:12px;"></div>
      <table class="exam-table"><tbody id="exam-tbody"></tbody></table>
      <div class="exam-save-bar"><div id="exam-save-info"></div><button class="rpt-btn" onclick="saveExamScores()">💾 儲存成績</button></div>
    </div>
  </div>

  <div class="page" id="page-report">
    <div class="card row2">
      <div><label>班級</label><select id="rpt-class-sel" onchange="onRptClassChange()"></select></div>
      <div><label>學生</label><select id="rpt-student-sel" disabled onchange="onRptStudentChange()"></select></div>
    </div>
    <div id="report-main" style="display:none;">
      <div class="card"><label>🎭 表現分數</label><input type="range" id="perf-slider" min="0" max="100" oninput="onPerfChange(this.value)"></div>
      <div id="report-preview" class="card" style="padding:0;"></div>
      <div class="card">
        <button class="mic-btn" onclick="genComment()">🤖 生成評語</button>
        <button class="rpt-btn secondary" style="margin-top:8px; width:100%;" onclick="downloadPDF()">⬇️ 下載 PDF</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-overview">
    <div class="card"><label>老師</label><select id="overview-teacher-sel" onchange="onOverviewTeacherChange()"></select><button class="mic-btn" style="margin-top:10px;" onclick="loadOverview()">🔍 查詢</button></div>
    <div id="overview-result"></div>
  </div>
</div>
</div>

<div class="wheel-overlay" id="wheel-overlay" style="display:none;" onclick="wheelOverlayClick(event)">
  <div class="wheel-panel">
    <div class="wheel-header"><div class="wheel-student" id="wheel-student-name"></div><button class="wheel-close" onclick="closeWheel()">×</button></div>
    <div class="wheel-display"><div class="score-big" id="wheel-score-display">--</div></div>
    <div class="wheel-scroll-wrap"><div class="wheel-selector"></div><div class="wheel-scroll" id="wheel-scroll"></div></div>
    <div class="wheel-quick" id="wheel-quick"></div>
    <div class="wheel-actions"><button class="wheel-clear" onclick="clearScore()">清除</button><button class="wheel-confirm" onclick="confirmScore()">確認 ✓</button></div>
  </div>
</div>
<div id="att-popup" class="att-popup" style="display:none;"></div>

<script>
// ══════════════════ 全域變數 ══════════════════
var API_URL = localStorage.getItem('nc_api_url') || '';
var AUTH_CODE = localStorage.getItem('nc_auth_code') || '';
var currentUser = null, classData = null, summaryData = null, availDates = [], lastMatchIdx = -1, cbCounter = 0, currentFilter = 'all';
var GEMINI_API_KEY = '', GEMINI_URL = '';
var mediaRecorder = null, audioChunks = [], isRecording = false, recTimerInterval = null, recSeconds = 0;
var wheelStudentIdx = -1, wheelValue = null, wheelContext = null, ITEM_HEIGHT = 52, QUICK_SCORES = [60,70,75,80,85,90,95,100];
var attPopupContext = null, examData = null, currentExamIdx = -1, pendingChanges = {}, reportData = null, perfScore = 80;

// 【重要修正】確保繁體中文定義
var SYMS      = ['V','○','●','△','▲','⊝'];
var SYMCLASS  = {'V':'sel-V','○':'sel-x1','●':'sel-x2','△':'sel-x3','▲':'sel-x4','⊝':'sel-x5'};
var SYM_SHORT = {'V':'到','○':'缺席','●':'補缺','△':'請假','▲':'補假','⊝':'遲到'};
var SYM_BG    = {'V':'#e6f4ea','○':'#fce8e6','●':'#f5cba7','△':'#fef9e7','▲':'#fad7a0','⊝':'#e8f0fe'};
var SYM_COLOR = {'V':'#1e7e34','○':'#c0392b','●':'#ca6f1e','△':'#d4ac0d','▲':'#ca8a04','⊝':'#1a5276'};
var ATT_CLASS = {'V':'att-V','○':'att-o','●':'att-ob','△':'att-d','▲':'att-db','⊝':'att-l'};
var RADAR_COLORS = ['#274e13','#1a5276','#7d3c98','#ca6f1e','#c0392b'];
var RADAR_LABELS = ['出席表現','作業均分','小考成績','大考成績','口語表現'];

// ══════════════════ 基礎功能 ══════════════════
function updateGeminiUrl() { GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_API_KEY; }

function jsonpCall(params, callback) {
  var cbName = '__ncCb' + (cbCounter++);
  var url = API_URL + '?callback=' + cbName;
  Object.keys(params).forEach(function(k) { url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k] === null ? '' : params[k]); });
  window[cbName] = function(data) { delete window[cbName]; var s = document.getElementById(cbName); if(s) s.remove(); callback(null, data); };
  var script = document.createElement('script'); script.id = cbName; script.src = url; document.body.appendChild(script);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(btn) btn.classList.add('active');
}

// ══════════════════ 登入邏輯 ══════════════════
window.addEventListener('load', function() {
  if (API_URL) document.getElementById('login-api-url').value = API_URL;
  if (API_URL && AUTH_CODE) autoLogin();
  buildWheel();
});

function autoLogin() {
  jsonpCall({ action: 'verifyAuth', authCode: AUTH_CODE }, (err, data) => {
    if(data && data.ok) onLoginSuccess(data);
    else localStorage.removeItem('nc_auth_code');
  });
}

function doLogin() {
  var apiUrl = document.getElementById('login-api-url').value.trim();
  var code = document.getElementById('login-code').value.trim();
  if(apiUrl) { API_URL = apiUrl; localStorage.setItem('nc_api_url', apiUrl); }
  jsonpCall({ action: 'verifyAuth', authCode: code }, (err, data) => {
    if(data && data.ok) { AUTH_CODE = code; localStorage.setItem('nc_auth_code', code); onLoginSuccess(data); }
    else document.getElementById('login-err').textContent = '授權碼無效';
  });
}

function onLoginSuccess(data) {
  currentUser = data;
  document.getElementById('auth-name-display').textContent = data.name;
  document.getElementById('auth-role-display').textContent = data.role === 'admin' ? '管理員' : '老師';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  if(data.role==='admin') document.getElementById('tab-overview').style.display='inline-block';
  
  jsonpCall({ action: 'getMyClasses', authCode: AUTH_CODE }, (err, res) => {
    var list = (res && res.myClasses) ? res.myClasses : [];
    if(data.role==='admin') { jsonpCall({action:'getClassList'}, (e, full) => populateSelects(full)); }
    else populateSelects(list);
  });
  loadGeminiKey();
}

function populateSelects(list) {
  var opts = '<option value="">請選擇班級...</option>' + list.map(c => `<option value="${c}">${c}</option>`).join('');
  ['class-sel','sum-class-sel','rpt-class-sel','exam-class-sel'].forEach(id => document.getElementById(id).innerHTML = opts);
}

function loadGeminiKey() { jsonpCall({ action: 'getGeminiKey' }, (err, data) => { if(data && data.key) { GEMINI_API_KEY = data.key; updateGeminiUrl(); } }); }

// ══════════════════ 總表渲染 (關鍵修正) ══════════════════
function onSumClassChange() {
  var className = document.getElementById('sum-class-sel').value;
  if(!className) return;
  document.getElementById('summary-wrap').innerHTML = '<div class="loading">讀取中...</div>';
  jsonpCall({ action: 'getClassSummary', className: className }, (err, data) => {
    summaryData = data; renderSummaryTable();
  });
}

function renderSummaryTable() {
  if(!summaryData) return;
  var lessons = summaryData.lessons, students = summaryData.students;
  var html = '<table class="summary-table"><thead><tr><th class="name-col">學生</th>';
  lessons.forEach(l => html += `<th>${l.unit}<br><small>${l.date}</small></th>`);
  html += '</tr></thead><tbody>';
  
  students.filter(st => (currentFilter === 'makeup' ? st.missingMakeup.length > 0 : true)).forEach((st, sIdx) => {
    html += `<tr><td class="name-col">${st.eName || st.cName}</td>`;
    lessons.forEach((l, lIdx) => {
      var rec = st.lessonRecords[lIdx] || {att:'', score:''};
      var bg = (rec.att === '○' || rec.att === '△') ? 'missing-makeup' : (rec.att !== '' && rec.score === '' ? 'missing-hw' : '');
      var attDisplay = rec.att ? `<span class="${ATT_CLASS[rec.att]}">${rec.att}</span>` : '·';
      html += `<td id="scell-${sIdx}-${lIdx}" class="${bg}">
        <div class="cell-att" onclick="openAttPopup(event,${sIdx},${lIdx})">${attDisplay}</div>
        <div class="cell-score ${rec.score?'has-score':''}" onclick="openWheel(${sIdx},'summary',${lIdx})">${rec.score || '-'}</div>
      </td>`;
    });
    html += '</tr>';
  });
  document.getElementById('summary-wrap').innerHTML = html + '</tbody></table>';
}

function updateSummaryCell(sIdx, lIdx) {
  var rec = summaryData.students[sIdx].lessonRecords[lIdx];
  var td = document.getElementById(`scell-${sIdx}-${lIdx}`);
  if(!td) return;
  td.className = (rec.att === '○' || rec.att === '△') ? 'missing-makeup' : (rec.att !== '' && rec.score === '' ? 'missing-hw' : '');
  var attDisplay = rec.att ? `<span class="${ATT_CLASS[rec.att]}">${rec.att}</span>` : '·';
  td.innerHTML = `<div class="cell-att" onclick="openAttPopup(event,${sIdx},${lIdx})">${attDisplay}</div>
                  <div class="cell-score ${rec.score?'has-score':''}" onclick="openWheel(${sIdx},'summary',${lIdx})">${rec.score || '-'}</div>`;
}

// ══════════════════ 彈窗邏輯 ══════════════════
function openAttPopup(e, sIdx, lIdx) {
  e.stopPropagation(); attPopupContext = {sIdx, lIdx};
  var popup = document.getElementById('att-popup');
  popup.innerHTML = SYMS.map(s => `<div class="att-popup-item" style="color:${SYM_COLOR[s]}" onclick="selectAttSym('${s}')">${s} ${SYM_SHORT[s]}</div>`).join('') + `<div class="att-popup-item" onclick="selectAttSym('')">✕ 清除</div>`;
  popup.style.display = 'flex'; popup.style.top = (e.pageY + 5) + 'px'; popup.style.left = (e.pageX - 20) + 'px';
}

function selectAttSym(sym) {
  var ctx = attPopupContext; var rec = summaryData.students[ctx.sIdx].lessonRecords[ctx.lIdx];
  rec.att = sym; updateSummaryCell(ctx.sIdx, ctx.lIdx);
  document.getElementById('att-popup').style.display = 'none';
  jsonpCall({ action:'writeCell', authCode:AUTH_CODE, className:summaryData.className, row:rec.attRow, col:rec.attCol, value:sym }, (err, r) => {});
}

// ══════════════════ 其它分頁功能維持 ══════════════════
function onClassChange() { /* 原本的點名頁載入日期邏輯 */ }
function onDateChange() { /* 原本的點名頁載入學生名單邏輯 */ }
function toggleMic() { /* 原本錄音邏輯 */ }
function onExamClassChange() { /* 原本考試成績載入邏輯 */ }
function saveExamScores() { /* 原本成績儲存邏輯 */ }
function onRptClassChange() { /* 原本成績單載入學生邏輯 */ }
function onPerfChange(v) { perfScore = v; renderReport(); }
function genComment() { /* 原本 AI 生成評語邏輯 */ }
function downloadPDF() { window.print(); }
function doLogout() { localStorage.removeItem('nc_auth_code'); location.reload(); }
function closeWheel() { document.getElementById('wheel-overlay').style.display='none'; }
function wheelOverlayClick(e) { if(e.target.id==='wheel-overlay') closeWheel(); }
function setFilter(f) { currentFilter = f; renderSummaryTable(); }
function getTodayMMDD() { var d = new Date(); return (d.getMonth()+1)+'/'+d.getDate(); }
function buildWheel() { /* 原本 0-100 轉盤生成邏輯 */ }

</script>
</body>
</html>
