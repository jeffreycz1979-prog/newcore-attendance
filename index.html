<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NewCore 語音點名</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; font-size: 14px; }
  .top { background: #274e13; color: white; padding: 12px 18px; display: flex; align-items: center; gap: 12px; }
  .top h2 { font-size: 15px; font-weight: 700; flex: 1; }
  .tab-bar { display: flex; }
  .tab-btn { padding: 6px 14px; font-size: 13px; border: none; cursor: pointer; background: rgba(255,255,255,0.15); color: white; border-radius: 6px; margin-left: 6px; }
  .tab-btn.active { background: white; color: #274e13; font-weight: 700; }
  .auth-bar { background: #1a3a0a; color: rgba(255,255,255,0.85); padding: 6px 18px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .auth-bar .auth-name { font-weight: 700; color: white; }
  .auth-bar .auth-role { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 2px 8px; font-size: 11px; }
  .auth-bar .auth-role.admin { background: #d4a017; color: #222; }
  .auth-logout { margin-left: auto; padding: 4px 10px; font-size: 11px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.4); background: none; color: white; cursor: pointer; }
  .body { padding: 14px; max-width: 900px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 5px; }
  select { width: 100%; padding: 9px 10px; font-size: 13px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; color: #222; }
  .mic-btn { flex: 1; padding: 13px; font-size: 15px; font-weight: 700; border-radius: 10px; border: none; background: #274e13; color: white; cursor: pointer; }
  .mic-btn.recording { background: #c0392b; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
  .status-bar { text-align: center; padding: 9px 12px; border-radius: 8px; font-size: 12px; background: #eee; color: #666; min-height: 36px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
  .status-bar.ok { background: #e6f4ea; color: #1e7e34; }
  
  /* 總表固定表頭設計 */
  .summary-table-wrap { overflow: auto; max-height: 75vh; position: relative; }
  .summary-table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 12px; }
  .summary-table th { position: sticky; top: 0; background: #274e13; color: white; z-index: 10; padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
  .summary-table .name-col { position: sticky; left: 0; background: #f8f9fa; z-index: 11; min-width: 100px; border-right: 1px solid #eee; }
  .summary-table thead th.name-col { z-index: 12; background: #274e13; top: 0; left: 0; }
  .summary-table td { padding: 8px; text-align: center; border-bottom: 1px solid #f0f0f0; }
  
  .cell-att { cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  .cell-score { cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  .cell-score.has-score { color: #185FA5; font-weight: 700; }
  .missing-makeup { background: #fff3cd !important; }
  .missing-hw { background: #fce8e6 !important; }
  .att-V { color: #1e7e34; font-weight: bold; }
  .att-o { color: #c0392b; font-weight: bold; }

  /* 其它功能 UI 維持 */
  .rpt-header { background:#274e13; color:white; padding:14px; text-align:center; border-radius:8px 8px 0 0; }
  .rpt-meta { display:grid; grid-template-columns:1fr 1fr 1fr; border-bottom:1px solid #f0f0f0; }
  .rpt-meta-cell { padding:10px; border-right:1px solid #f0f0f0; }
  .rpt-comment-area { width:100%; padding:10px; border:2px solid #ffd666; border-radius:8px; font-family:inherit; }
  .exam-table { width:100%; border-collapse:collapse; }
  .exam-table td { padding:10px; border-bottom:1px solid #f5f5f5; }
  .score-input { width:60px; padding:5px; text-align:center; border-radius:5px; border:1px solid #ddd; }
  .wheel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display:flex; align-items:flex-end; justify-content:center; }
  .wheel-panel { background: white; width: 100%; max-width: 450px; border-radius: 20px 20px 0 0; padding: 20px; }
  .att-popup { position: fixed; z-index: 4000; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 10px; display:none; flex-direction:column; min-width:130px; }
  .att-popup-item { padding: 10px; cursor: pointer; border-radius: 8px; font-weight: 600; }
  .att-popup-item:hover { background:#f0f2f5; }
  .save-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #274e13; color: white; padding: 8px 20px; border-radius: 20px; z-index: 5000; animation: fadeInOut 1.8s ease forwards; }
  @keyframes fadeInOut { 0% { opacity:0; } 15% { opacity:1; } 85% { opacity:1; } 100% { opacity:0; } }
</style>
</head>
<body>

<div id="login-screen" class="login-wrap" style="display:flex; height:100vh; align-items:center; justify-content:center; background:#1a3a0a;">
  <div class="card" style="width:340px; text-align:center; padding:30px;">
    <h2 style="color:#274e13; margin-bottom:10px;">NewCore 系統</h2>
    <input type="password" id="login-code" placeholder="請輸入授權碼" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
    <button class="mic-btn" onclick="doLogin()">登入系統</button>
    <div id="login-err" style="color:red; font-size:12px; margin-top:10px;"></div>
    <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
      <label style="font-size:9px;">GAS API URL</label>
      <input type="text" id="login-api-url" style="width:100%; font-size:10px; color:#999; border:none; background:none; text-align:center;">
    </div>
  </div>
</div>

<div id="main-screen" style="display:none;">
  <div class="top">
    <h2>🎤 NewCore 管理系統</h2>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('attend',this)">點名</button>
      <button class="tab-btn" onclick="switchTab('summary',this)">總表</button>
      <button class="tab-btn" onclick="switchTab('report',this)">成績單</button>
      <button class="tab-btn" onclick="switchTab('exam',this)">考試成績</button>
      <button class="tab-btn" id="tab-overview" style="display:none;" onclick="switchTab('overview',this)">📊 總覽</button>
    </div>
  </div>

  <div class="auth-bar">
    👤 <span id="auth-name-display">載入中...</span> (<span id="auth-role-display">--</span>)
    <button class="auth-logout" onclick="doLogout()">登出</button>
  </div>

  <div class="body">
    <div class="page active" id="page-attend">
      <div class="card row2">
        <div><label>班級</label><select id="class-sel" onchange="onClassChange()"></select></div>
        <div><label>堂次</label><select id="date-sel" disabled onchange="onDateChange()"></select></div>
      </div>
      <div class="card">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤 開始錄音點名</button>
        <div class="status-bar" id="status-bar" style="margin-top:10px;">請選擇班級以開始</div>
        <div id="student-table-wrap" style="margin-top:15px;"></div>
      </div>
    </div>

    <div class="page" id="page-summary">
      <div class="card">
        <label>選擇班級</label><select id="sum-class-sel" onchange="onSumClassChange()"></select>
        <div style="margin-top:10px; display:flex; gap:8px;">
          <button class="tab-btn active" id="filter-all" onclick="setFilter('all')" style="background:#274e13">全部</button>
          <button class="tab-btn" id="filter-makeup" onclick="setFilter('makeup')" style="background:#856404">未補課</button>
        </div>
      </div>
      <div class="summary-table-wrap card" style="padding:0;" id="summary-wrap">
        <div class="empty">請先選擇班級</div>
      </div>
    </div>

    <div class="page" id="page-report">
       <div class="card row2">
          <div><label>班級</label><select id="rpt-class-sel" onchange="onRptClassChange()"></select></div>
          <div><label>學生</label><select id="rpt-student-sel" disabled onchange="onRptStudentChange()"></select></div>
       </div>
       <div id="report-main" style="display:none;">
          <div class="card"><label>🎭 表現分數</label><input type="range" id="perf-slider" min="0" max="100" oninput="onPerfChange(this.value)" style="width:100%;"></div>
          <div id="report-preview" class="card" style="padding:0;"></div>
          <div class="card">
            <button class="mic-btn" onclick="genComment()">🤖 AI 生成評語</button>
            <button class="mic-btn" style="background:#1a5276; margin-top:8px;" onclick="downloadPDF()">⬇️ 下載 PDF</button>
          </div>
       </div>
    </div>

    <div class="page" id="page-exam">
      <div class="card"><label>班級</label><select id="exam-class-sel" onchange="onExamClassChange()"></select></div>
      <div id="exam-main" style="display:none;" class="card">
         <div id="exam-tab-row" style="display:flex; gap:5px; margin-bottom:15px;"></div>
         <table class="exam-table"><tbody id="exam-tbody"></tbody></table>
         <button class="mic-btn" style="width:100%; margin-top:15px;" onclick="saveExamScores()">💾 儲存成績</button>
      </div>
    </div>

    <div class="page" id="page-overview">
       <div class="card"><label>選擇老師</label><select id="overview-teacher-sel"></select><button class="mic-btn" style="margin-top:10px;" onclick="loadOverview()">🔍 查詢</button></div>
       <div id="overview-result"></div>
    </div>
  </div>
</div>

<div id="wheel-overlay" class="wheel-overlay" style="display:none;" onclick="if(event.target===this)closeWheel()">
  <div class="wheel-panel">
    <h3 id="wheel-student-name">學生姓名</h3>
    <div style="font-size:50px; text-align:center; color:#274e13; font-weight:bold;" id="wheel-score-display">80</div>
    <div id="wheel-scroll" style="height:120px; overflow-y:scroll; border:1px solid #eee; margin:15px 0;"></div>
    <button class="mic-btn" style="width:100%;" onclick="confirmScore()">確認 ✓</button>
  </div>
</div>
<div id="att-popup" class="att-popup"></div>

<script>
// ══════════════════ 全域變數 ══════════════════
var API_URL = localStorage.getItem('nc_api_url') || '';
var AUTH_CODE = localStorage.getItem('nc_auth_code') || '';
var GEMINI_API_KEY = '';
var MODEL_PRIORITY = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-2.0-flash'];

var SYMS      = ['V','○','●','△','▲','⊝'];
var SYM_SHORT = {'V':'到','○':'缺席','●':'補缺','△':'請假','▲':'補假','⊝':'遲到'};
var SYM_COLOR = {'V':'#1e7e34','○':'#c0392b','●':'#ca6f1e','△':'#d4ac0d','▲':'#ca8a04','⊝':'#1a5276'};
var ATT_CLASS = {'V':'att-V','○':'att-o','●':'att-ob','△':'att-d','▲':'att-db','⊝':'att-l'};

var classData=null, summaryData=null, currentFilter='all', attPopupContext=null, wheelContext=null, examData=null, reportData=null, perfScore=80;
var mediaRecorder=null, audioChunks=[];

// ══════════════════ 核心通訊 ══════════════════
function jsonpCall(params, callback) {
  var cbName = '__nc' + Math.floor(Math.random()*1000000);
  var url = API_URL + '?callback=' + cbName;
  Object.keys(params).forEach(k => url += '&' + k + '=' + encodeURIComponent(params[k]));
  window[cbName] = data => { delete window[cbName]; document.body.removeChild(s); callback(null, data); };
  var s = document.createElement('script'); s.src = url; document.body.appendChild(s);
}

// ══════════════════ 登入與初始化 ══════════════
window.onload = () => {
  if(API_URL) document.getElementById('login-api-url').value = API_URL;
  if(API_URL && AUTH_CODE) autoLogin();
};

function autoLogin() {
  jsonpCall({action:'verifyAuth', authCode:AUTH_CODE}, (err, data) => {
    if(data && data.ok) onLoginSuccess(data);
  });
}

function doLogin() {
  let apiUrl = document.getElementById('login-api-url').value.trim();
  let code = document.getElementById('login-code').value.trim();
  if(apiUrl) { API_URL = apiUrl; localStorage.setItem('nc_api_url', apiUrl); }
  jsonpCall({action:'verifyAuth', authCode:code}, (err, data) => {
    if(data && data.ok) { AUTH_CODE = code; localStorage.setItem('nc_auth_code', code); onLoginSuccess(data); }
    else document.getElementById('login-err').innerText = '授權碼錯誤';
  });
}

function onLoginSuccess(data) {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  document.getElementById('auth-name-display').innerText = data.name;
  document.getElementById('auth-role-display').innerText = data.role==='admin'?'管理員':'老師';
  if(data.role==='admin') document.getElementById('tab-overview').style.display='inline-block';
  loadInitData();
}

function loadInitData() {
  jsonpCall({action:'getGeminiKey'}, (err, data) => { GEMINI_API_KEY = data.key; });
  jsonpCall({action:'getClassList'}, (err, list) => {
    let opts = '<option value="">請選擇班級...</option>';
    list.forEach(c => opts += `<option value="${c}">${c}</option>`);
    ['class-sel','sum-class-sel','rpt-class-sel','exam-class-sel'].forEach(id => document.getElementById(id).innerHTML = opts);
  });
  if(document.getElementById('tab-overview').style.display !== 'none') initOverviewTab();
}

// ══════════════════ 點名邏輯 ══════════════════
function onClassChange() {
  let className = document.getElementById('class-sel').value;
  jsonpCall({action:'getAvailableDates', className}, (err, dates) => {
    let opts = '<option value="">請選擇堂次...</option>';
    dates.forEach(d => opts += `<option value="${d.colIdx}">${d.dateText} - ${d.unit}</option>`);
    document.getElementById('date-sel').innerHTML = opts; document.getElementById('date-sel').disabled = false;
  });
}

function onDateChange() {
  let className = document.getElementById('class-sel').value;
  let colIdx = document.getElementById('date-sel').value;
  jsonpCall({action:'getClassDataByCol', className, attCol:colIdx}, (err, data) => {
    classData = data; renderAttTable();
  });
}

function renderAttTable() {
  let html = '<table class="exam-table"><thead><tr><th>學生</th><th>狀態</th><th>分數</th></tr></thead><tbody>';
  classData.students.forEach((st, i) => {
    html += `<tr>
      <td>${st.eName || st.cName}</td>
      <td><button class="score-input" style="background:${SYM_BG_GET(st.status)}" onclick="clickStatus(${i})">${st.status || '-'}</button></td>
      <td><button class="score-input" onclick="openWheel(${i},'attend')">${st.score || '-'}</button></td>
    </tr>`;
  });
  document.getElementById('student-table-wrap').innerHTML = html + '</tbody></table>';
}

function clickStatus(i) {
  let st = classData.students[i];
  let cur = SYMS.indexOf(st.status);
  let next = SYMS[(cur + 1) % SYMS.length];
  st.status = next; renderAttTable();
  writeOne(i, next, null);
}

function writeOne(idx, status, score) {
  let st = classData.students[idx];
  jsonpCall({action:'writeAttendance', authCode:AUTH_CODE, className:classData.className, studentRow:st.row, attCol:classData.attCol, scoreCol:classData.scoreCol, status:status||'', score:score||''}, (err,r)=>{});
}

// ══════════════════ 總表邏輯 (修正版) ══════════════
function onSumClassChange() {
  let className = document.getElementById('sum-class-sel').value;
  document.getElementById('summary-wrap').innerHTML = '讀取中...';
  jsonpCall({action:'getClassSummary', className}, (err, data) => {
    summaryData = data; renderSummaryTable();
  });
}

function renderSummaryTable() {
  if(!summaryData) return;
  let students = summaryData.students, lessons = summaryData.lessons;
  let html = '<table class="summary-table"><thead><tr><th class="name-col">學生</th>';
  lessons.forEach(l => html += `<th>${l.unit}<br><small>${l.date}</small></th>`);
  html += '</tr></thead><tbody>';
  
  students.filter(st => {
    if(currentFilter==='makeup') return st.missingMakeup.length > 0;
    return true;
  }).forEach((st, sIdx) => {
    html += `<tr><td class="name-col"><b>${st.eName || st.cName}</b></td>`;
    lessons.forEach((l, lIdx) => {
      let rec = st.lessonRecords[lIdx] || {att:'', score:''};
      let bg = (rec.att === '○' || rec.att === '△') ? 'missing-makeup' : (rec.score==='' && rec.att !=='' ? 'missing-hw' : '');
      html += `<td class="${bg}">
        <div class="cell-att ${ATT_CLASS[rec.att]}" onclick="openAttPopup(event,${sIdx},${lIdx})">${rec.att || '·'}</div>
        <div class="cell-score ${rec.score?'has-score':''}" onclick="openWheel(${sIdx},'summary',${lIdx})">${rec.score || '-'}</div>
      </td>`;
    });
    html += '</tr>';
  });
  document.getElementById('summary-wrap').innerHTML = html + '</tbody></table>';
}

function openAttPopup(e, sIdx, lIdx) {
  e.stopPropagation(); attPopupContext = {sIdx, lIdx};
  let popup = document.getElementById('att-popup');
  popup.innerHTML = SYMS.map(s => `<div class="att-popup-item" style="color:${SYM_COLOR[s]}" onclick="selectAttSym('${s}')">${s} ${SYM_SHORT[s]}</div>`).join('') + `<div class="att-popup-item" onclick="selectAttSym('')">✕ 清除</div>`;
  popup.style.display = 'flex'; popup.style.top = e.pageY + 'px'; popup.style.left = e.pageX + 'px';
}

function selectAttSym(sym) {
  let ctx = attPopupContext; summaryData.students[ctx.sIdx].lessonRecords[ctx.lIdx].att = sym;
  document.getElementById('att-popup').style.display='none'; renderSummaryTable();
  let rec = summaryData.students[ctx.sIdx].lessonRecords[ctx.lIdx];
  jsonpCall({action:'writeCell', authCode:AUTH_CODE, className:summaryData.className, row:rec.attRow, col:rec.attCol, value:sym}, (err,r)=>{});
}

// ══════════════════ 成績單 & PDF ══════════════
function onRptClassChange() {
  let className = document.getElementById('rpt-class-sel').value;
  jsonpCall({action:'getClassSummary', className}, (err, data) => {
    let opts = '<option value="">請選擇學生...</option>';
    data.students.forEach(st => opts += `<option value="${st.sheetRow}">${st.eName} (${st.cName})</option>`);
    document.getElementById('rpt-student-sel').innerHTML = opts; document.getElementById('rpt-student-sel').disabled = false;
  });
}

function onRptStudentChange() {
  let className = document.getElementById('rpt-class-sel').value;
  let row = document.getElementById('rpt-student-sel').value;
  jsonpCall({action:'getStudentReport', className, studentRow:row}, (err, data) => {
    reportData = data; document.getElementById('report-main').style.display='block'; renderReport();
  });
}

function renderReport() {
  let d = reportData;
  let html = `<div class="rpt-header"><h3>🎓 ${d.className} 學習成果單</h3><p>${d.today}</p></div>`;
  html += `<div class="rpt-meta">
    <div class="rpt-meta-cell"><label>學生</label><div class="mc-val">${d.eName}</div></div>
    <div class="rpt-meta-cell"><label>總分</label><div class="mc-val" style="color:#274e13">${d.totalScore.toFixed(1)}</div></div>
    <div class="rpt-meta-cell"><label>名次</label><div class="mc-val">${d.rankDisplay}</div></div>
  </div>
  <div style="padding:15px;"><canvas id="radar-canvas" width="300" height="250"></canvas></div>
  <div style="padding:15px;"><textarea id="rpt-comment" class="rpt-comment-area" rows="4" placeholder="請輸入評語..."></textarea></div>`;
  document.getElementById('report-preview').innerHTML = html;
  setTimeout(() => drawRadar([d.attendanceScore, d.homeworkAvg, d.quizAvg, d.testAvg, perfScore]), 50);
}

function drawRadar(vals) {
  let canvas = document.getElementById('radar-canvas'); if(!canvas) return;
  let ctx = canvas.getContext('2d'), W=canvas.width, H=canvas.height, cx=W/2, cy=H/2, R=80;
  ctx.beginPath();
  for(let i=0; i<5; i++) {
    let a = (i/5)*Math.PI*2 - Math.PI/2, r = R * (vals[i]/100);
    i===0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
  }
  ctx.closePath(); ctx.fillStyle="rgba(39,78,19,0.2)"; ctx.fill(); ctx.strokeStyle="#274e13"; ctx.stroke();
}

// ══════════════════ 考試成績分頁 ══════════════
function onExamClassChange() {
  let className = document.getElementById('exam-class-sel').value;
  jsonpCall({action:'getExamData', className}, (err, data) => {
    examData = data; document.getElementById('exam-main').style.display='block'; renderExamTabs();
  });
}

function renderExamTabs() {
  let html = examData.exams.map((ex, i) => `<button class="tab-btn" style="background:#1a5276" onclick="selectExam(${i})">${ex.label}</button>`).join('');
  document.getElementById('exam-tab-row').innerHTML = html; selectExam(0);
}

function selectExam(idx) {
  let ex = examData.exams[idx];
  let html = examData.students.map((st, i) => `<tr><td>${st.eName}</td><td><input type="number" class="score-input" value="${ex.scores[i]||''}" onchange="updateExamScore(${idx},${i},this.value)"></td></tr>`).join('');
  document.getElementById('exam-tbody').innerHTML = html;
}

function saveExamScores() {
  showToast('正在儲存...');
  // 實作後端寫入...
}

// ══════════════════ 轉盤組件 ══════════════════
function openWheel(sIdx, mode, lIdx) {
  wheelContext = {sIdx, mode, lIdx};
  let name = mode==='attend' ? classData.students[sIdx].eName : summaryData.students[sIdx].eName;
  document.getElementById('wheel-student-name').innerText = name;
  let html = ''; for(let i=0; i<=110; i++) html += `<div style="padding:10px; text-align:center;" onclick="setWheelVal(${i})">${i}</div>`;
  document.getElementById('wheel-scroll').innerHTML = html;
  document.getElementById('wheel-overlay').style.display = 'flex';
}

function setWheelVal(v) { document.getElementById('wheel-score-display').innerText = v; }
function closeWheel() { document.getElementById('wheel-overlay').style.display='none'; }
function confirmScore() {
  let v = document.getElementById('wheel-score-display').innerText;
  let ctx = wheelContext;
  if(ctx.mode === 'attend') { classData.students[ctx.sIdx].score = v; renderAttTable(); writeOne(ctx.sIdx, null, v); }
  else { 
    summaryData.students[ctx.sIdx].lessonRecords[ctx.lIdx].score = v; renderSummaryTable();
    let rec = summaryData.students[ctx.sIdx].lessonRecords[ctx.lIdx];
    jsonpCall({action:'writeCell', authCode:AUTH_CODE, className:summaryData.className, row:rec.scoreRow, col:rec.scoreCol, value:v}, (err, r)=>{});
  }
  closeWheel();
}

// ══════════════════ 輔助工具 ══════════════════
function SYM_BG_GET(s) { return {'V':'#e6f4ea','○':'#fce8e6','●':'#f5cba7','△':'#fef9e7','▲':'#fad7a0','⊝':'#e8f0fe'}[s] || 'white'; }
function switchTab(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active'); btn.classList.add('active');
}
function doLogout() { localStorage.removeItem('nc_auth_code'); location.reload(); }
function showToast(m) { let t=document.createElement('div'); t.className='save-toast'; t.innerText=m; document.body.appendChild(t); setTimeout(()=>document.body.removeChild(t),1800); }
function genComment() { showToast('AI 生成中...'); }
function downloadPDF() { window.print(); }
